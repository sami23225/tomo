<!DOCTYPE html>
<html lang="en">
<head>
  <script src="tomo-sync.js" defer></script>
  <script src="tomo-enhance.js" defer></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Tomo" />
<meta name="theme-color" content="#f7f4ef" />
<title>Tomo · 友</title>
<style>
  :root{
    --bg:#f5f5f3; --surface:#ffffff; --surface-2:#efefec; --surface-3:#fafaf8;
    --ink:#202024; --muted:#8a8a90; --faint:#bcbcc1; --line:#eaeae5;
    --rose:#4f5670; --rose-soft:#edeef2; --rose-deep:#363b50;
    --indigo:#646b82; --green:#5b8d72; --green-soft:#e8f0eb; --amber:#c2974e;
    --red:#cf5a5a; --red-soft:#f8e7e6;
    --jp:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(20,20,28,.04),0 4px 16px rgba(20,20,28,.05);
    --shadow-lg:0 8px 30px rgba(20,20,28,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--ui);}
  body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .jp{font-family:var(--jp);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:96px;}

  header{position:sticky;top:0;z-index:20;background:rgba(245,245,243,.85);
    backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);
    padding:14px 20px calc(14px + env(safe-area-inset-top)) 20px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:11px;}
  .logo{width:36px;height:36px;border-radius:50%;background:var(--rose);
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--jp);font-weight:700;
    font-size:18px;box-shadow:0 4px 12px rgba(79,86,112,.35);}
  .brand h1{font-size:18px;margin:0;letter-spacing:.2px;font-weight:700;}
  .brand .sub{font-size:11px;color:var(--muted);font-family:var(--jp);letter-spacing:2px;margin-top:1px;}
  .streak{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
    padding:7px 12px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:var(--shadow);}
  .streak .flame{display:inline-flex;align-items:center;color:var(--rose);}

  main{padding:20px 18px 8px;}
  .view{display:none;animation:fade .35s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;
    box-shadow:var(--shadow);margin-bottom:16px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--rose);margin:0 0 6px;}
  h2.title{font-size:23px;margin:2px 0 4px;letter-spacing:-.3px;}
  h3{font-size:16px;margin:0 0 10px;}
  p{line-height:1.6;}
  .muted{color:var(--muted);}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--muted);}
  .pill.rose{background:var(--rose-soft);color:var(--rose-deep);}
  .pill.green{background:var(--green-soft);color:var(--green);}
  .row{display:flex;gap:12px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--ink);color:#fff;
    padding:13px 18px;border-radius:13px;font-weight:650;font-size:15px;transition:transform .12s,opacity .2s;}
  .btn:active{transform:scale(.97);}
  .btn.rose{background:var(--rose);box-shadow:0 6px 18px rgba(79,86,112,.30);}
  .btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink);box-shadow:var(--shadow);}
  .btn.block{width:100%;}
  .btn.sm{padding:9px 14px;font-size:13.5px;border-radius:11px;}

  .hero{background:var(--hero-grad,#23232a);color:#fff;border:none;position:relative;overflow:hidden;}
  .hero .kana{position:absolute;right:-10px;bottom:-26px;font-family:var(--jp);font-size:130px;font-weight:700;
    color:rgba(255,255,255,.07);line-height:1;pointer-events:none;}
  .hero .eyebrow{color:#aeb4c8;}
  .hero h2{font-size:21px;margin:4px 0 6px;position:relative;}
  .hero p{color:rgba(255,255,255,.8);margin:0 0 16px;position:relative;font-size:14px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 12px;text-align:center;box-shadow:var(--shadow);}
  .stat .num{font-size:26px;font-weight:750;letter-spacing:-.5px;}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.3px;}
  .stat .num.rose{color:var(--rose);} .stat .num.green{color:var(--green);} .stat .num.indigo{color:var(--indigo);}

  .mini{display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;background:var(--surface-3);
    border:1px solid var(--line);margin-bottom:10px;cursor:pointer;transition:transform .12s;}
  .mini:active{transform:scale(.99);}
  .mini .ico{width:40px;height:40px;border-radius:11px;flex:0 0 40px;display:flex;align-items:center;justify-content:center;background:var(--rose-soft);}
  .mini .ico.g{background:var(--green-soft);} .mini .ico.i{background:#e8e9f3;}
  .mini .tx{flex:1;} .mini .tx b{font-size:15px;} .mini .tx span{display:block;font-size:12.5px;color:var(--muted);margin-top:1px;}
  .mini .arr{color:var(--faint);}

  .phase-h{display:flex;align-items:baseline;justify-content:space-between;margin:22px 4px 12px;}
  .phase-h:first-child{margin-top:4px;}
  .phase-h b{font-size:16px;} .phase-h span{font-size:12px;color:var(--muted);}
  .phase-h.rev b{color:var(--muted);font-weight:650;}
  .unit{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);
    border-radius:15px;padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow);transition:transform .12s;}
  .unit.ready{cursor:pointer;} .unit.ready:active{transform:scale(.99);}
  .unit.locked{opacity:.58;}
  .wknum{width:42px;height:42px;flex:0 0 42px;border-radius:12px;background:var(--surface-2);display:flex;
    flex-direction:column;align-items:center;justify-content:center;font-weight:750;line-height:1;}
  .wknum small{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
  .wknum.done{background:var(--green);color:#fff;} .wknum.done small{color:rgba(255,255,255,.8);}
  .wknum.cur{background:var(--rose);color:#fff;} .wknum.cur small{color:rgba(255,255,255,.8);}
  .unit .info{flex:1;min-width:0;}
  .unit .info b{font-size:15px;display:block;}
  .unit .info .jpt{font-family:var(--jp);color:var(--rose-deep);font-size:13px;margin-top:1px;}
  .unit .info .cando{font-size:12.5px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .unit .tick{color:var(--green);font-size:20px;} .unit .soon{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.5px;}

  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:600;font-size:14px;margin-bottom:14px;padding:6px 2px;}
  .sec{margin-bottom:18px;}
  .sec .lab{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--indigo);margin-bottom:9px;}
  .sec .lab .d{width:7px;height:7px;border-radius:50%;background:var(--indigo);}
  .when{background:var(--surface-3);border-left:3px solid var(--rose);padding:13px 15px;border-radius:0 12px 12px 0;line-height:1.65;font-size:14.5px;}
  .how{background:#23232a;color:#f3efe9;border-radius:13px;padding:15px 16px;font-family:var(--jp);font-size:15px;line-height:2;}
  .how code{color:#aeb4c8;font-style:normal;}
  .ex{border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:10px;background:var(--surface);}
  .ex .jl{font-family:var(--jp);font-size:19px;line-height:1.5;display:flex;align-items:flex-start;gap:10px;justify-content:space-between;}
  .ex .jl span{flex:1;}
  .ex .rom{color:var(--muted);font-size:13px;margin-top:5px;font-style:italic;}
  .ex .en{font-size:14px;margin-top:4px;}
  .spk{flex:0 0 34px;width:34px;height:34px;border-radius:50%;background:var(--rose-soft);display:flex;align-items:center;justify-content:center;transition:transform .12s;}
  .spk:active{transform:scale(.88);}
  .spk svg{width:16px;height:16px;}
  .warn{display:flex;gap:10px;padding:11px 13px;border-radius:11px;background:var(--red-soft);margin-bottom:9px;font-size:13.5px;line-height:1.55;}
  .warn .x{color:var(--red);font-weight:800;flex:0 0 auto;}

  .qwrap{max-width:620px;margin:0 auto;}
  .qbar{height:7px;background:var(--surface-2);border-radius:99px;overflow:hidden;margin-bottom:20px;}
  .qbar i{display:block;height:100%;background:var(--rose);border-radius:99px;transition:width .35s;}
  .qq{font-size:21px;font-weight:650;line-height:1.5;margin:6px 0 20px;font-family:var(--jp);}
  .opt{display:block;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--line);
    border-radius:13px;padding:15px 16px;margin-bottom:11px;font-size:17px;font-family:var(--jp);transition:.15s;box-shadow:var(--shadow);}
  .opt:active{transform:scale(.99);}
  .opt.correct{border-color:var(--green);background:var(--green-soft);}
  .opt.wrong{border-color:var(--red);background:var(--red-soft);}
  .opt.dim{opacity:.5;}
  .fb{border-radius:13px;padding:14px 16px;margin:4px 0 16px;font-size:14px;line-height:1.6;display:none;}
  .fb.show{display:block;animation:fade .3s;}
  .fb.ok{background:var(--green-soft);} .fb.no{background:var(--red-soft);}
  .fb b{font-weight:750;}
  .result{text-align:center;padding:30px 16px;}
  .result .big{font-size:54px;font-weight:800;letter-spacing:-1px;}
  .ring{width:130px;height:130px;margin:6px auto 14px;}

  .deck{max-width:560px;margin:0 auto;}
  .fcard{perspective:1400px;height:300px;margin-bottom:18px;}
  .fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
  .fc-inner.flip{transform:rotateY(180deg);}
  .fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:var(--shadow-lg);border:1px solid var(--line);}
  .fc-front{background:var(--surface);}
  .fc-front .big{font-family:var(--jp);font-size:52px;font-weight:600;line-height:1.2;text-align:center;}
  .fc-front .hint{position:absolute;bottom:18px;color:var(--faint);font-size:12px;}
  .fc-back{background:#23232a;color:#fff;transform:rotateY(180deg);}
  .fc-back .rd{font-family:var(--jp);font-size:30px;color:#aeb4c8;}
  .fc-back .mn{font-size:22px;margin-top:8px;font-weight:600;text-align:center;}
  .grades{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .grade{padding:12px 2px;border-radius:12px;font-weight:700;font-size:13px;text-align:center;color:#fff;}
  .grade small{display:block;font-size:10px;font-weight:600;opacity:.8;margin-top:2px;}
  .g-again{background:#c98a8a;} .g-hard{background:var(--amber);} .g-good{background:var(--green);} .g-easy{background:var(--indigo);}
  .leech{background:var(--red-soft);color:#8d4a4a;border-radius:10px;padding:8px 11px;font-size:12px;line-height:1.45;margin-bottom:10px;}

  .barrow{margin-bottom:14px;}
  .barrow .t{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:6px;}
  .barrow .t b{font-weight:600;} .barrow .t span{color:var(--muted);font-weight:600;}
  .track{height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden;}
  .track i{display:block;height:100%;border-radius:99px;background:var(--rose);}
  .track i.g{background:var(--green);}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;}
  .empty .em{margin-bottom:10px;color:var(--faint);}

  nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,255,255,.9);
    backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);
    border-top:1px solid var(--line);display:flex;justify-content:space-around;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--faint);font-size:10.5px;font-weight:650;transition:color .2s;}
  .tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
  .tab.on{color:var(--rose);}
  .toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:50;box-shadow:var(--shadow-lg);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media(min-width:680px){ .fcard{height:340px;} .stats{gap:14px;} }

  ruby{ruby-align:center;}
  rt{font-size:.52em;color:var(--rose-deep);font-weight:600;font-family:var(--jp);user-select:none;letter-spacing:0;}
  body.furi-off rt{display:none;}
  .hdr-right{display:flex;align-items:center;gap:9px;}
  .furiBtn{width:34px;height:34px;border-radius:50%;background:var(--rose);color:#fff;font-family:var(--jp);font-weight:700;font-size:15px;box-shadow:0 3px 10px rgba(79,86,112,.3);}
  .furiBtn.off{background:var(--surface);color:var(--faint);border:1px solid var(--line);box-shadow:none;text-decoration:line-through;}

  .kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:10px;}
  .ktile{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 6px 10px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s;}
  .ktile:active{transform:scale(.96);}
  .ktile.kn{border-color:var(--green);background:var(--green-soft);}
  .ktile .kc{font-size:34px;line-height:1;}
  .ktile .km{font-size:11px;color:var(--muted);margin-top:7px;}
  .kbig{font-size:118px;text-align:center;line-height:1.05;margin:4px 0 2px;}
  .krow{display:flex;gap:12px;margin:4px 0 8px;}
  .kcell{flex:1;background:var(--surface-3);border:1px solid var(--line);border-radius:13px;padding:13px 8px;text-align:center;}
  .kcell span{display:block;font-size:9.5px;font-weight:700;letter-spacing:1px;color:var(--rose);margin-bottom:5px;}
  .kcell b{font-size:19px;}
  .mini .ico{color:var(--rose-deep);} .mini .ico.g{color:var(--green);} .mini .ico.i{color:var(--indigo);}
  .empty .em svg{stroke-width:1.4;}
  .todo{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
  .todo.done{background:var(--surface-3);}
  .tcheck{width:27px;height:27px;flex:0 0 27px;border-radius:50%;border:1.8px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;color:#fff;}
  .todo.done .tcheck{background:var(--green);border-color:var(--green);}
  .ttx{flex:1;min-width:0;cursor:pointer;}
  .ttx b{font-size:15px;display:block;}
  .ttx span{font-size:12.5px;color:var(--muted);}
  .todo.done .ttx b{text-decoration:line-through;color:var(--muted);}
  .tgo{flex:0 0 auto;font-size:13px;font-weight:650;color:var(--rose);background:var(--rose-soft);padding:8px 12px;border-radius:10px;}
  .ugrid{display:grid;grid-template-columns:1fr;gap:10px;}
  .ugrid .unit{margin-bottom:0;}
  @media(min-width:740px){
    .app{max-width:100%;} nav{max-width:100%;} main{padding:24px max(34px,3.5vw) 8px;}
    .ugrid{grid-template-columns:1fr 1fr;} .stats{gap:16px;} .hero h2{font-size:24px;} .fcard{height:360px;}
    .kgrid{grid-template-columns:repeat(auto-fill,minmax(92px,1fr));}
  }
  @media(min-width:1100px){ .ugrid{grid-template-columns:repeat(3,1fr);} main{padding:28px max(48px,4vw) 8px;} }
  @media(min-width:900px){ #v-lesson{max-width:860px;margin-left:auto;margin-right:auto;} }
  .vk{font-size:26px;font-family:var(--jp);width:50px;flex:0 0 50px;text-align:center;line-height:1;}
  .vbig{font-size:62px;text-align:center;font-family:var(--jp);margin:8px 0 2px;line-height:1.15;}
  @media(max-width:430px){ .tab{font-size:9.5px;} .tab svg{width:21px;height:21px;} }
  .stepdots{display:flex;gap:6px;margin:0 0 12px;}
  .sd{width:9px;height:9px;border-radius:50%;background:var(--surface-2);}
  .sd.cur{background:var(--rose);} .sd.done{background:var(--green);}
  .rsent{display:flex;align-items:flex-start;gap:10px;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);}
  .rsent:last-child{border-bottom:none;}
  .rsent .jp{font-size:18px;line-height:1.75;flex:1;}
  .btiles{display:flex;flex-wrap:wrap;gap:8px;}
  .btile{padding:10px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface);font-size:17px;color:var(--ink);cursor:pointer;line-height:1.3;}
  .btile.in{background:var(--rose);color:#fff;border-color:var(--rose);}
  .btile.in rt{color:#e8e9f0;}
  .bslot{min-height:56px;border:1.5px dashed var(--line);border-radius:14px;padding:11px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--surface-2);}
  body.furi-off ruby{cursor:pointer;border-bottom:1px dotted var(--rose);}
  body.furi-off ruby.peek{border-bottom:none;}
  body.furi-off ruby.peek rt{display:inline;}
  .lctrl{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .ll{font-size:12px;font-weight:700;color:var(--rose-deep);min-width:44px;}
  .lbtn{padding:6px 13px;border:1.5px solid var(--line);border-radius:20px;background:var(--surface);font-size:13px;color:var(--ink);cursor:pointer;}
  .lbtn.on{background:var(--rose);color:#fff;border-color:var(--rose);}
  .lsel{padding:6px 10px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface);font-size:13px;max-width:220px;color:var(--ink);}
  .pnote{margin-top:10px;padding:10px 12px;background:var(--surface-3);border-radius:10px;font-size:12.5px;line-height:1.55;color:var(--ink);}
  .pnote .jp{color:var(--rose-deep);font-weight:700;}
  .gw{cursor:pointer;border-bottom:1px dotted var(--faint);}
  .gw ruby{border-bottom:none;}
  .pblank{color:var(--rose);font-weight:800;padding:0 2px;}
  #gtip{position:fixed;z-index:9999;background:var(--rose-deep);color:#fff;padding:7px 11px;border-radius:9px;font-size:13px;max-width:74vw;box-shadow:0 8px 22px rgba(0,0,0,.22);display:none;line-height:1.4;}
  #gtip .gr{color:#d7dbec;font-weight:700;margin-right:6px;}
  .swatches{display:flex;flex-wrap:wrap;gap:8px;}
  .sw{display:flex;align-items:center;gap:7px;padding:6px 12px 6px 6px;border:1.5px solid var(--line);border-radius:22px;background:var(--surface);font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;}
  .sw.on{border-color:var(--rose);box-shadow:0 0 0 1.5px var(--rose);}
  .sw .dot{width:18px;height:18px;border-radius:50%;display:inline-block;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);}
  .rblock{border-bottom:1px solid var(--line);}
  .rblock:last-child{border-bottom:none;}
  .rblock .rsent{border-bottom:none;}
  .rtr{font-size:13px;color:var(--muted);line-height:1.5;padding:0 0 10px 2px;}

5:{when:"Casual past. The great news: <b>plain past = the て-form with て→た, で→だ.</b> 食べて→食べた, 飲んで→飲んだ. Negative plain past = <b>〜なかった</b> (from the 〜ない form). This unlocks casual storytelling and is the base for 〜たら, 〜たことがある, and more.",

9:{when:"Three ways to suggest doing something together. <b>〜ましょう</b> = “let’s ~” (basically decided). <b>〜ましょうか</b> = “shall we / shall I ~?” (offering). <b>〜ませんか</b> = “won’t you ~?” — a softer invitation that leaves room to decline. All attach to the verb stem.",how:["verb stem + ましょう  →  let’s ~","verb stem + ましょうか  →  shall we / shall I?","verb stem + ませんか  →  won’t you ~? (invitation)"],ex:[{jp:"一緒に昼ご飯を食べませんか。",r:"Issho ni hirugohan o tabemasen ka.",e:"Won’t you have lunch together?"},{jp:"公園へ行きましょう。",r:"Kōen e ikimashō.",e:"Let’s go to the park."},{jp:"荷物を持ちましょうか。",r:"Nimotsu o mochimashō ka.",e:"Shall I carry your bags?"},{jp:"週末、映画を見ませんか。",r:"Shūmatsu, eiga o mimasen ka.",e:"Would you like to see a movie this weekend?"}],miss:["All attach to the verb stem: 行き+ましょう／ませんか (not ×行くましょう).","ませんか is an invitation, not a real negative — answer はい／ええ to accept.","ましょうか offers help or suggests; ましょう assumes you both agree."],quiz:[{q:"“Let’s go.”  行き＿。",c:["ましょう","ませんか","ますか","たい"],a:0,x:"verb stem + ましょう = let’s."},{q:"“Won’t you eat together?”  一緒に食べ＿。",c:["ましょう","ませんか","ました","たいです"],a:1,x:"ませんか = soft invitation."},{q:"These attach to which form?",c:["dictionary form","verb stem","て-form","plain past"],a:1,x:"The verb stem (ます-stem)."},{q:"“Shall I help?”  手伝い＿。",c:["ましょうか","ませんでした","たいですか","てください"],a:0,x:"ましょうか offers help."}],cards:[["〜ましょう","","let’s ~"],["〜ませんか","","won’t you ~? (invitation)"],["一緒に","いっしょに","together"],["公園","こうえん","park"],["週末","しゅうまつ","weekend"],["手伝う","てつだう","to help"]]},
10:{when:"The <b>potential form</b> means “can / be able to do.” Two ways: conjugate the verb (食べる→食べられる, 飲む→飲める), or use dictionary form + <b>ことができる</b>. With the potential form, the object usually switches from を to <b>が</b>.",how:["Group 2: drop る + られる  (食べる→食べられる)","Group 1: う-row → え-row + る  (飲む→飲める, 書く→書ける)","Irregular: する→できる, 来る→こられる","dictionary + ことができる  ·  object often takes が"],ex:[{jp:"私は漢字が読めます。",r:"Watashi wa kanji ga yomemasu.",e:"I can read kanji."},{jp:"ここで写真を撮ることができます。",r:"Koko de shashin o toru koto ga dekimasu.",e:"You can take photos here."},{jp:"納豆が食べられますか。",r:"Nattō ga taberaremasu ka.",e:"Can you eat natto?"},{jp:"日本語が少し話せます。",r:"Nihongo ga sukoshi hanasemasu.",e:"I can speak a little Japanese."}],miss:["する becomes できる (not ×しられる); 来る becomes こられる.","With the potential form, the object usually takes が: 漢字が読める.","Group 1 shifts the last sound to the え-row + る: 行く→行ける, 飲む→飲める."],quiz:[{q:"Potential form of 飲む (“can drink”)?",c:["飲みる","飲める","飲まれる","飲もる"],a:1,x:"う-row む → え-row め + る."},{q:"Potential form of する?",c:["される","しれる","できる","すられる"],a:2,x:"する → できる."},{q:"“I can read kanji.”  漢字＿読めます。",c:["を","が","に","で"],a:1,x:"Potential → object takes が."},{q:"“can take photos” (with ことができる)  写真を撮る＿できます。",c:["ことが","のが","ように","ために"],a:0,x:"dictionary + ことができる."}],cards:[["〜られる","","can, be able to"],["できる","","can do"],["読める","よめる","can read"],["話せる","はなせる","can speak"],["少し","すこし","a little"],["納豆","なっとう","natto"]]},
11:{when:"<b>〜たり〜たりする</b> lists a few representative actions (“do things like A and B”) — a non-exhaustive list. <b>〜ながら</b> means doing two things at once (“while ~”). たり builds on the plain past (た→たり); ながら attaches to the verb stem.",how:["plain past + り … plain past + り + する  →  食べたり飲んだりする","verb stem + ながら  →  while doing  (聞きながら)","with ながら, the second verb is the main action"],ex:[{jp:"週末は本を読んだり、映画を見たりします。",r:"Shūmatsu wa hon o yondari, eiga o mitari shimasu.",e:"On weekends I read, watch movies, and so on."},{jp:"音楽を聞きながら勉強します。",r:"Ongaku o kikinagara benkyō shimasu.",e:"I study while listening to music."},{jp:"公園で歌ったり踊ったりしました。",r:"Kōen de utattari odottari shimashita.",e:"We sang and danced (among other things) at the park."},{jp:"歩きながら話しましょう。",r:"Arukinagara hanashimashō.",e:"Let’s talk while walking."}],miss:["たり builds on the plain past: 食べた→食べたり, 飲んだ→飲んだり, ending with する.","ながら attaches to the verb stem: 聞き+ながら (not ×聞くながら).","With ながら, both actions are by the same person; the second is the main one."],quiz:[{q:"“read, watch, and so on”  本を読ん＿、映画を見たりします。",c:["だり","たり","でり","なり"],a:0,x:"読んだ → 読んだり (で→だ stays)."},{q:"“while listening to music”  音楽を聞き＿勉強します。",c:["ながら","たり","ので","から"],a:0,x:"stem + ながら = while."},{q:"たり attaches to which form?",c:["dictionary","plain past","て-form","stem"],a:1,x:"The plain past (た→たり)."},{q:"ながら attaches to…?",c:["verb stem","plain past","dictionary","ない-form"],a:0,x:"The verb stem."}],cards:[["〜たり〜たり","","do things like A and B"],["〜ながら","","while doing"],["音楽","おんがく","music"],["聞く","きく","to listen; ask"],["歩く","あるく","to walk"],["踊る","おどる","to dance"]]},
12:{when:"Three time connectors. <b>〜とき</b> = “when ~.” <b>〜まえに</b> = “before ~” (takes the dictionary form). <b>〜あとで</b> = “after ~” (takes the plain past). With とき, the tense before it shifts the meaning.",how:["[plain] + とき  →  when ~  (子供のとき, 行くとき)","[dictionary] + まえに  →  before ~  (寝るまえに)","[plain past た] + あとで  →  after ~  (食べたあとで)","noun + の + まえに／あとで  (食事のまえに)"],ex:[{jp:"寝るまえに歯を磨きます。",r:"Neru mae ni ha o migakimasu.",e:"I brush my teeth before sleeping."},{jp:"ご飯を食べたあとで、散歩します。",r:"Gohan o tabeta ato de, sanpo shimasu.",e:"After eating, I take a walk."},{jp:"子供のとき、よく泳ぎました。",r:"Kodomo no toki, yoku oyogimashita.",e:"When I was a child, I swam a lot."},{jp:"日本へ行くとき、カメラを買います。",r:"Nihon e iku toki, kamera o kaimasu.",e:"When I go to Japan, I’ll buy a camera."}],miss:["まえに takes the dictionary form even for past events: 食べるまえに (not ×食べたまえに).","あとで takes the plain past: 食べたあとで.","行くとき = “when going (before arriving)”; 行ったとき = “when (I) arrived.”"],quiz:[{q:"“before sleeping”  寝る＿歯を磨きます。",c:["あとで","まえに","とき","ながら"],a:1,x:"dictionary + まえに = before."},{q:"“after eating”  食べた＿、散歩します。",c:["まえに","あとで","とき","から"],a:1,x:"plain past + あとで = after."},{q:"まえに attaches to which form?",c:["dictionary form","plain past","て-form","stem"],a:0,x:"Always the dictionary form."},{q:"“When I was a child”  子供＿とき",c:["の","な","だ","に"],a:0,x:"noun + の + とき."}],cards:[["〜とき","","when ~"],["〜まえに","","before ~"],["〜あとで","","after ~"],["歯","は","tooth, teeth"],["散歩","さんぽ","a walk"],["子供","こども","child"]]},
13:{when:"Obligation and its absence. <b>〜なければいけません</b> = “must / have to ~.” <b>〜なくてもいいです</b> = “don’t have to ~.” Both come from the 〜ない form: drop the い → なければ / なくても.",how:["〜ない → なければいけません (must) ／ なければなりません (formal)","〜ない → なくてもいいです (don’t have to)","casual “must”: 〜なきゃ / 〜ないと"],ex:[{jp:"明日、早く起きなければいけません。",r:"Ashita, hayaku okinakereba ikemasen.",e:"I have to get up early tomorrow."},{jp:"薬を飲まなければいけません。",r:"Kusuri o nomanakereba ikemasen.",e:"I have to take my medicine."},{jp:"今日は宿題をしなくてもいいです。",r:"Kyō wa shukudai o shinakute mo ii desu.",e:"I don’t have to do homework today."},{jp:"靴を脱がなければいけませんか。",r:"Kutsu o nuganakereba ikemasen ka.",e:"Do I have to take off my shoes?"}],miss:["Build from the 〜ない form: 飲まない → 飲まなければ ／ 飲まなくても.","なければいけません is literally a double negative (“if not…, won’t do”) but means “must.”","In speech, 〜なければ often shortens to 〜なきゃ: 行かなきゃ."],quiz:[{q:"“I have to take medicine.”  薬を飲ま＿。",c:["なくてもいいです","なければいけません","ないでください","たいです"],a:1,x:"〜なければいけません = must."},{q:"“I don’t have to study.”  勉強し＿。",c:["なければいけません","なくてもいいです","てはいけません","ましょう"],a:1,x:"〜なくてもいい = don’t have to."},{q:"These come from which form?",c:["ます-form","ない-form","て-form","plain past"],a:1,x:"The 〜ない form."},{q:"Casual “I gotta go” = ?",c:["行かなきゃ","行きましょう","行きたい","行ってもいい"],a:0,x:"なければ → なきゃ."}],cards:[["〜なければいけない","","must, have to"],["〜なくてもいい","","don’t have to"],["起きる","おきる","to get up"],["薬","くすり","medicine"],["靴","くつ","shoes"],["脱ぐ","ぬぐ","to take off"]]},
14:{when:"Two ways to say “if/when.” <b>〜たら</b> is the flexible one (“if/when A, then…”), built on the plain past (た→たら). <b>〜と</b> means “whenever A, (automatically) B” — for predictable results like directions, nature, and machines. After と you can’t use a request or invitation.",how:["plain past + ら → たら  (食べたら, 行ったら, 安かったら, 暇だったら)","dictionary + と → automatic result  (押すと…)","たら: one-time / hypothetical  ·  と: general / always true"],ex:[{jp:"雨が降ったら、行きません。",r:"Ame ga futtara, ikimasen.",e:"If it rains, I won’t go."},{jp:"日本へ行ったら、寿司を食べたいです。",r:"Nihon e ittara, sushi o tabetai desu.",e:"When I go to Japan, I want to eat sushi."},{jp:"このボタンを押すと、ドアが開きます。",r:"Kono botan o osu to, doa ga akimasu.",e:"When you press this button, the door opens."},{jp:"安かったら、買います。",r:"Yasukattara, kaimasu.",e:"If it’s cheap, I’ll buy it."}],miss:["たら is built on the plain past — verbs (行った→行ったら), adjectives (安かったら), nouns (暇だったら).","After と you can’t put a request, invitation, or your own will (×押すと、行きましょう). Use たら.","たら = “once / after” (specific); と = “always, automatically.”"],quiz:[{q:"“If it rains, I won’t go.”  雨が降っ＿、行きません。",c:["たら","ると","ば","なら"],a:0,x:"降った → 降ったら."},{q:"“When you press it, it opens.”  押す＿、開きます。",c:["たら","と","ので","から"],a:1,x:"と = automatic result."},{q:"たら is built on which form?",c:["dictionary","plain past","て-form","stem"],a:1,x:"The plain past (た→たら)."},{q:"Which can NOT follow と?",c:["a fact","a natural result","a request","a machine’s behavior"],a:2,x:"After と, no requests/invitations."}],cards:[["〜たら","","if / when (then)"],["〜と","","whenever (automatic)"],["雨","あめ","rain"],["降る","ふる","to fall (rain)"],["押す","おす","to push, press"],["寿司","すし","sushi"]]},
15:{when:"Three verbs for giving and receiving, chosen by <b>direction</b>. <b>あげる</b> = I/someone gives (to others). <b>くれる</b> = someone gives to ME (or my side). <b>もらう</b> = someone receives. Add 〜て to describe doing or receiving a favor.",how:["A は B に [thing] を あげる  →  A gives to B","A は (私に) [thing] を くれる  →  A gives to me","A は B に [thing] を もらう  →  A receives from B","〜てあげる／くれる／もらう  →  favors"],ex:[{jp:"友達に本をあげました。",r:"Tomodachi ni hon o agemashita.",e:"I gave my friend a book."},{jp:"母がセーターをくれました。",r:"Haha ga sētā o kuremashita.",e:"My mom gave me a sweater."},{jp:"先生に日本語を教えてもらいました。",r:"Sensei ni nihongo o oshiete moraimashita.",e:"I had the teacher teach me Japanese."},{jp:"友達が手伝ってくれました。",r:"Tomodachi ga tetsudatte kuremashita.",e:"My friend helped me (did me the favor)."}],miss:["くれる is only for giving TO me / my side — me giving to others is あげる.","With もらう, the receiver is the topic and the giver takes に (or から): 先生に もらう.","〜てくれる shows gratitude for a favor done for you — very natural and common."],quiz:[{q:"“My mom gave me a sweater.”  母がセーターを＿。",c:["あげました","くれました","もらいました","しました"],a:1,x:"Given TO me → くれる."},{q:"“I gave my friend a book.”  友達に本を＿。",c:["あげました","くれました","もらいました","きました"],a:0,x:"I give to others → あげる."},{q:"“…teaching from the teacher”  先生＿教えてもらいました。",c:["を","に","が","で"],a:1,x:"Giver takes に with もらう."},{q:"Which is used only for giving TO you?",c:["あげる","くれる","もらう","する"],a:1,x:"くれる = gives to me/my side."}],cards:[["あげる","","to give (to others)"],["くれる","","to give (to me)"],["もらう","","to receive"],["教える","おしえる","to teach, tell"],["母","はは","(my) mother"],["友達","ともだち","friend"]]},
16:{when:"Use <b>〜と思います</b> for “I think (that) ~” and <b>〜と言いました</b> for “(someone) said that ~.” The quoted thought or speech comes BEFORE と and is in <b>plain form</b>. Nouns and な-adjectives take だ before と.",how:["[plain form] + と思います  →  I think that ~","[plain form] + と言いました  →  (someone) said that ~","noun / な-adj + だ + と  (学生だと思う, 元気だと思う)","に + 言う marks the listener"],ex:[{jp:"明日は雨が降ると思います。",r:"Ashita wa ame ga furu to omoimasu.",e:"I think it will rain tomorrow."},{jp:"この映画はいいと思います。",r:"Kono eiga wa ii to omoimasu.",e:"I think this movie is good."},{jp:"田中さんは来ないと言いました。",r:"Tanaka-san wa konai to iimashita.",e:"Tanaka said (that) he won’t come."},{jp:"彼は学生だと思います。",r:"Kare wa gakusei da to omoimasu.",e:"I think he’s a student."}],miss:["The part before と is in plain form: 降る／来ない／いい／学生だ + と.","Nouns and な-adjectives take だ before と: 学生だと思う (not ×学生と思う).","と思います = your own opinion now; for others use 〜と思っている."],quiz:[{q:"“I think it will rain.”  雨が降る＿思います。",c:["と","を","が","に"],a:0,x:"と marks the end of the thought."},{q:"“I think he’s a student.”  彼は学生＿と思います。",c:["だ","の","な","で"],a:0,x:"noun + だ + と."},{q:"The part before と is in which form?",c:["plain form","ます-form","て-form","stem"],a:0,x:"Plain (short) form."},{q:"“Tanaka said he won’t come.”  来ない＿言いました。",c:["を","と","に","か"],a:1,x:"と marks the quote."}],cards:[["〜と思う","","I think that ~"],["〜と言う","","to say that ~"],["思う","おもう","to think"],["言う","いう","to say"],["彼","かれ","he, boyfriend"],["雨","あめ","rain"]]},
17:{when:"Beyond “-ing,” <b>〜ている</b> also describes a resulting <b>state</b>. Many verbs come in transitive/intransitive pairs: a transitive verb (someone does it, takes を) and an intransitive one (it happens by itself, takes が). Intransitive + ている = a state: 窓が開いている = “the window is open.”",how:["intransitive + ている  →  resulting state  (ドアが閉まっている)","pairs: 開く(あく)／開ける, 閉まる／閉める, つく／つける","intransitive takes が ; transitive takes を"],ex:[{jp:"窓が開いています。",r:"Mado ga aite imasu.",e:"The window is open."},{jp:"電気がついています。",r:"Denki ga tsuite imasu.",e:"The light is on."},{jp:"田中さんは結婚しています。",r:"Tanaka-san wa kekkon shite imasu.",e:"Tanaka is married."},{jp:"車が止まっています。",r:"Kuruma ga tomatte imasu.",e:"The car is stopped (parked)."}],miss:["Intransitive verbs describe a state with ている and take が: 窓が開いている.","Don’t confuse 開く (あく, intransitive — it opens) with 開ける (あける, transitive — I open it).","結婚しています ／ 知っています describe ongoing states, not actions in progress."],quiz:[{q:"“The window is open.”  窓＿開いています。",c:["を","が","に","で"],a:1,x:"Intransitive state → takes が."},{q:"“Tanaka is married.”  田中さんは結婚＿。",c:["します","しています","しました","したい"],a:1,x:"State → 結婚しています."},{q:"開く (あく) is…?",c:["transitive (takes を)","intransitive (takes が)","an adjective","a noun"],a:1,x:"あく = intransitive."},{q:"“The light is on.”  電気が＿。",c:["つけています","ついています","つきました","つきたい"],a:1,x:"Intransitive state つく → ついています."}],cards:[["〜ている","","(resulting) state"],["開く","あく","to open (by itself)"],["閉まる","しまる","to close (by itself)"],["結婚する","けっこんする","to marry"],["電気","でんき","light; electricity"],["窓","まど","window"]]},
18:{when:"No new grammar this week — it’s a tune-up. Re-clear your weakest quizzes (Progress shows them), re-read the “Watch out for” boxes that tripped you, and shuffle it all with Practice → Mixed review. Goal: every earlier quiz back at 90%+.",how:["Open Progress → find your lowest scores","Re-do those quizzes until 90%+","Run Practice → Mixed review","Clear every due flashcard"],ex:[{jp:"ちょっと待ってください。",r:"Chotto matte kudasai.",e:"Please wait a moment. (Week 2)"},{jp:"日本へ行きたいです。",r:"Nihon e ikitai desu.",e:"I want to go to Japan. (Week 7)"},{jp:"漢字が読めます。",r:"Kanji ga yomemasu.",e:"I can read kanji. (Week 10)"},{jp:"雨が降ったら、行きません。",r:"Ame ga futtara, ikimasen.",e:"If it rains, I won’t go. (Week 14)"}],miss:["Review what you got wrong, not what you already know.","Say each example out loud — recognising it isn’t the same as producing it.","If a point still feels shaky, give it another full week."],quiz:[{q:"て-form of 行く?",c:["行きて","行いて","行って","行くて"],a:2,x:"Exception: 行く → 行って."},{q:"Plain negative of 食べる?",c:["食べない","食べません","食べなかった","食べらない"],a:0,x:"Group 2: drop る + ない."},{q:"“I want to go.”  行き＿です。",c:["たい","たく","ましょう","てください"],a:0,x:"stem + たい."},{q:"“If it rains…”  雨が降っ＿、行きません。",c:["たら","ると","ば","なら"],a:0,x:"降った → 降ったら."}],cards:[]},
19:{when:"The finish line — no new grammar. Record yourself speaking for ~3 minutes: introduce yourself, talk about your week, a plan, and an opinion. Listen back and note what you reached for but couldn’t say — that’s your next-quarter syllabus. Then bring it all to your tutor.",how:["Pick 3 topics: your week, a plan, an opinion","Speak ~3 minutes, recording yourself","Listen back; note the gaps","Set 2–3 goals for early 2027"],ex:[{jp:"週末は友達と公園へ行きました。",r:"Shūmatsu wa tomodachi to kōen e ikimashita.",e:"On the weekend I went to the park with a friend."},{jp:"来年、日本へ行きたいと思います。",r:"Rainen, Nihon e ikitai to omoimasu.",e:"I think I want to go to Japan next year."},{jp:"この映画はおもしろいと思います。",r:"Kono eiga wa omoshiroi to omoimasu.",e:"I think this movie is interesting."},{jp:"日本語が好きです。",r:"Nihongo ga suki desu.",e:"I like Japanese."}],miss:["Fluency is using what you know smoothly — not knowing everything.","Mistakes while speaking are progress, not failure.","Re-record monthly; hearing your old self is the best motivation."],quiz:[{q:"“I think it will rain.”  雨が降る＿思います。",c:["と","を","が","に"],a:0,x:"と marks the thought."},{q:"“Let’s go together.”  一緒に行き＿。",c:["ましょう","ません","たい","てください"],a:0,x:"stem + ましょう = let’s."},{q:"“My friend helped me.”  友達が手伝って＿。",c:["あげました","くれました","もらいました","いました"],a:1,x:"A favour done for me → くれました."}],cards:[]}

/* ============================ FLASHCARDS (SRS) ============================ */
function cardId(w,i){return "c"+w+"_"+i;}
function seedCards(w){const c=CONTENT[w];if(!c)return;c.cards.forEach((cd,i)=>{const id=cardId(w,i);if(!state.cards[id]){state.cards[id]={due:todayStr(),interval:0,ease:2.3,reps:0,w:w,i:i};}});save();}
function allSeededIds(){return Object.keys(state.cards);}
function dueCards(){const t=todayStr();return allSeededIds().filter(id=>state.cards[id].due<=t);}
function cardData(id){const s=state.cards[id];return CONTENT[s.w].cards[s.i];}
let session={queue:[],idx:0,flipped:false,reviewed:0};
function renderCards(){
  Object.keys(state.started).forEach(w=>seedCards(Number(w)));
  Object.keys(state.done).forEach(w=>seedCards(Number(w)));
  const due=dueCards();
  if(allSeededIds().length===0){
    document.getElementById("v-cards").innerHTML='<div class="empty"><div class="em">'+svgIcon(IC.cards,42)+'</div><p>Your deck fills up as you start lessons.<br>Open a lesson in <b>Learn</b> to add its words here.</p><button class="btn rose" onclick="go(\'learn\')">Go to lessons</button></div>';return;
  }
  if(due.length===0){
    document.getElementById("v-cards").innerHTML='<div class="empty"><div class="em">'+svgIcon(IC.check,42)+'</div><p><b>All caught up!</b><br>No cards due right now. Come back tomorrow,<br>or do a free review below.</p><button class="btn ghost" onclick="startReview(true)">Review all anyway</button></div>';return;
  }
  let h='<p class="eyebrow">Spaced repetition</p><h2 class="title">Flashcards</h2>';
  h+='<div class="card" style="text-align:center"><div class="num" style="font-size:40px;font-weight:750;color:var(--rose)">'+due.length+'</div><p class="muted" style="margin:0 0 16px">cards due for review</p><button class="btn rose block" onclick="startReview(false)">Start review →</button></div>';
  h+='<p class="muted" style="text-align:center;font-size:12.5px">Be honest — “Again” is how it learns what to show you.</p>';
  document.getElementById("v-cards").innerHTML=h;
}
function startReview(all){
  let ids=all?allSeededIds().slice():dueCards();
  ids=ids.sort(()=>Math.random()-.5).slice(0,20);
  session={queue:ids,idx:0,flipped:false,reviewed:0};
  if(session.queue.length===0){renderCards();return;}
  drawCard();
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("v-cards").classList.add("active");window.scrollTo(0,0);
}
function drawCard(){
  if(session.idx>=session.queue.length){return reviewDone();}
  const id=session.queue[session.idx];const cd=cardData(id);session.flipped=false;
  const front=cd[0];const reading=cd[1]||cd[0];const mean=cd[2];
  var hint;if(mean.indexOf("→")>=0){hint="Make the "+mean.substring(mean.indexOf("→")+1).replace(/[()!]/g,"").trim();}else if(/[一-鿿]/.test(reading)&&reading!==front){hint="Say the form";}else{hint="Recall the meaning";}hint+=" · tap to reveal";
  let h='<div class="deck"><button class="back" onclick="go(\'cards\')">‹ Exit</button>'+
    '<p class="muted" style="text-align:center;font-size:12px;font-weight:700;letter-spacing:.5px">'+(session.idx+1)+' / '+session.queue.length+'</p>'+
    '<div class="fcard" onclick="flip()"><div class="fc-inner" id="fci">'+
      '<div class="fc-face fc-front"><div class="big jp">'+jpf(front)+'</div><div class="hint">'+hint+'</div></div>'+
      '<div class="fc-face fc-back"><div class="rd jp">'+jpf(reading)+'</div><div class="mn">'+mean+'</div>'+
        '<div style="margin-top:16px">'+spkBtn(reading)+'</div></div>'+
    '</div></div>';
  h+='<div id="grades" style="visibility:hidden">'+leechBadge(state.cards[id])+gradesHTML(state.cards[id],'grade')+'</div></div>';
  document.getElementById("v-cards").innerHTML=h;
}
function flip(){const fci=document.getElementById("fci");if(!fci)return;session.flipped=!session.flipped;fci.classList.toggle("flip",session.flipped);
  document.getElementById("grades").style.visibility=session.flipped?"visible":"hidden";
  if(session.flipped){const cd=cardData(session.queue[session.idx]);speak(cd[1]||cd[0]);}}
function grade(g){
  const id=session.queue[session.idx];const s=state.cards[id];
  if(sched(s,g))session.queue.push(id);
  session.reviewed++;save();session.idx++;drawCard();
}
function reviewDone(){
  recordStudy();
  if(chainStep===0){chainStep=1;runChain();return;}
  document.getElementById("v-cards").innerHTML='<div class="empty"><div class="em">'+svgIcon(IC.trophy,42)+'</div><p><b>Review done!</b><br>You worked through '+session.reviewed+' cards.<br>They’ll resurface right when you’re about to forget.</p><button class="btn rose" onclick="go(\'cards\')">Finish</button> <button class="btn ghost" onclick="go(\'home\')">Home</button></div>';
}

/* ============================ PROGRESS ============================ */
function renderProgress(){
  const doneN=Object.keys(state.done).filter(w=>isMain(Number(w))).length;const total=OUTLINE.filter(o=>isMain(o.w)).length;
  const knownCards=allSeededIds().filter(id=>state.cards[id].reps>0).length;
  const totalCards=allSeededIds().length;const dueN=dueCards().length;
  let h='<p class="eyebrow">Your progress</p><h2 class="title">How it’s going</h2>';
  h+='<div class="stats"><div class="stat"><div class="num rose">'+(state.streak||0)+'</div><div class="lbl">DAY STREAK</div></div>'+
     '<div class="stat"><div class="num green">'+doneN+'/'+total+'</div><div class="lbl">LESSONS</div></div>'+
     '<div class="stat"><div class="num indigo">'+knownCards+'</div><div class="lbl">WORDS LEARNED</div></div></div>';
  const pct=Math.round((doneN/total)*100);
  h+='<div class="card"><div class="barrow"><div class="t"><b>Path to conversation</b><span>'+pct+'%</span></div><div class="track"><i class="g" style="width:'+pct+'%"></i></div></div><p class="muted" style="margin:0;font-size:12.5px">'+doneN+' of '+total+' weeks complete · '+(state.lastStudy?"last studied "+state.lastStudy:"let’s begin!")+'</p></div>';
  const attempted=Object.keys(state.best).map(Number).sort((a,b)=>a-b);
  if(attempted.length){
    h+='<div class="card"><h3>Quiz mastery</h3><p class="muted" style="margin:0 0 10px;font-size:12.5px">Your best quiz score for each week. This is <b>not</b> the same as finishing the week — a week only closes when you\u2019ve also ticked all '+STEPS.length+' daily steps.</p>';
    attempted.forEach(w=>{const o=OUTLINE.find(x=>x.w===w);if(!o)return;const b=state.best[w];const col=b>=80?"g":"";
      h+='<div class="barrow"><div class="t"><b>'+(isMain(w)?"Wk "+w:"Rev")+' · '+o.t+'</b><span>'+b+'%</span></div><div class="track"><i class="'+col+'" style="width:'+b+'%;'+(b<80?"background:var(--amber)":"")+'"></i></div></div>';});
    h+='</div>';
    const weak=attempted.filter(w=>state.best[w]<80).sort((a,b)=>state.best[a]-state.best[b]).slice(0,3);
    if(weak.length){h+='<div class="card" style="background:var(--rose-soft);border-color:#f0d6db"><h3 style="color:var(--rose-deep)">Worth another look</h3>';
      weak.forEach(w=>{const o=OUTLINE.find(x=>x.w===w);h+='<div class="mini" style="background:var(--surface)" onclick="startQuiz('+w+')"><div class="ico">'+svgIcon(IC.target)+'</div><div class="tx"><b>'+(isMain(w)?"Wk "+w:"Rev")+' · '+o.t+'</b><span>'+state.best[w]+'% — retry the quiz</span></div><div class="arr">›</div></div>';});
      h+='</div>';}
  }else{
    h+='<div class="card"><p class="muted" style="margin:0;text-align:center">Take a quiz in <b>Practice</b> and your mastery shows up here.</p></div>';
  }
  h+='<div class="card"><div class="barrow"><div class="t"><b>Flashcards</b><span>'+knownCards+'/'+totalCards+' seen · '+dueN+' due</span></div><div class="track"><i style="width:'+(totalCards?Math.round(knownCards/totalCards*100):0)+'%"></i></div></div>'+(leechCount()?'<p class="muted" style="margin:10px 0 0;font-size:12.5px">'+leechCount()+' tricky card(s) — missed 6+ times. Worth a mnemonic.</p>':'')+'</div>';
  h+='<div class="card"><h3>Appearance</h3><p class="muted" style="margin:0 0 8px;font-size:12.5px">Look</p><div class="swatches" style="margin-bottom:14px"><button class="sw'+(state.look!=="washi"?" on":"")+'" onclick="setLook(\'classic\')">Classic</button><button class="sw'+(state.look==="washi"?" on":"")+'" onclick="setLook(\'washi\')">Washi</button></div><p class="muted" style="margin:0 0 12px;font-size:12.5px">Colour</p><div class="swatches">'+THEMES.map(function(t){return '<button class="sw'+(state.theme===t.id?' on':'')+'" onclick="setTheme(\''+t.id+'\')"><span class="dot" style="background:'+t.grad+'"></span>'+t.name+'</button>';}).join('')+'</div></div>';
  h+='<div class="card"><h3>Your data</h3><p class="muted" style="margin:0 0 12px;font-size:12.5px">Your progress is stored in this browser, tied to the app&rsquo;s web address. Back it up before moving the app to a new address, or switching phone.</p><button class="btn ghost block" onclick="exportProgress()" style="margin-bottom:10px">Back up my progress</button><button class="btn ghost block" onclick="importProgress()">Restore from a backup</button></div>';
  var _cw=currentWeek().w;
  h+='<div class="card"><h3>Where I actually am</h3><p class="muted" style="margin:0 0 12px;font-size:12.5px">Studied some of this elsewhere, or moved the app to a new address? Tell Tomo the week you\u2019re <b>currently on</b>. Every earlier week is marked complete and its flashcards are added to your review deck.</p><div style="display:flex;gap:10px;align-items:center"><select id="jumpW" style="flex:1;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface);color:var(--ink);font:inherit">'+OUTLINE.filter(function(o){return isMain(o.w)&&CONTENT[o.w];}).map(function(o){return '<option value="'+o.w+'"'+(o.w===_cw?' selected':'')+'>Week '+o.w+' · '+o.t+'</option>';}).join('')+'</select><button class="btn ghost" onclick="jumpToWeek()">Set</button></div></div>';
  h+='<button class="btn ghost block" onclick="resetAll()" style="margin-top:6px;color:var(--muted)">Reset all progress</button>';
  document.getElementById("v-progress").innerHTML=h;
}
function jumpToWeek(){
  var el=document.getElementById("jumpW");if(!el)return;var w=Number(el.value);if(!w)return;
  var prev=OUTLINE.filter(function(o){return isMain(o.w)&&o.w<w;}).map(function(o){return o.w;});
  if(!confirm("Mark Week"+(prev.length===1?" ":"s ")+(prev.length?prev.join(", "):"\u2014 none")+" complete and start you on Week "+w+"?\n\nFlashcards from those weeks get added to your review deck. Nothing else is erased."))return;
  prev.forEach(function(x){state.done[x]=true;if(!state.best[x])state.best[x]=100;if(CONTENT[x])seedCards(x);});
  Object.keys(state.done).map(Number).forEach(function(x){if(isMain(x)&&x>=w)delete state.done[x];});
  state.step=0;state.focusDate=null;state._undo=null;
  save();renderStreak();toast("You\u2019re on Week "+w+" \ud83c\udf38");go("home");
}
function resetAll(){if(confirm("Reset all progress, streaks, and flashcard memory? This can’t be undone.")){state=JSON.parse(JSON.stringify(DEFAULT));save();renderStreak();toast("Progress reset");go("home");}}

function kSeed(k){if(!state.kanji[k])state.kanji[k]={due:todayStr(),interval:0,ease:2.3,reps:0};save();}
function kAdded(){return Object.keys(state.kanji).length;}
function kDue(){const t=todayStr();return Object.keys(state.kanji).filter(k=>state.kanji[k].due<=t);}
function kFind(k){for(const set of KANJI){const it=set.list.find(x=>x.k===k);if(it)return it;}return null;}
function kTotal(){return KANJI.reduce((a,s)=>a+s.list.length,0);}

function renderKanji(){
  const total=kTotal();const added=kAdded();const due=kDue().length;
  let h='<p class="eyebrow">Kanji</p><h2 class="title jp">漢字</h2><p class="muted" style="margin:0 0 14px">Readings, meanings & example words. Add a kanji to start reviewing it with spaced repetition — then practice writing it on your worksheets.</p>';
  h+='<div class="stats"><div class="stat"><div class="num rose">'+added+'</div><div class="lbl">IN REVIEW</div></div>'+
     '<div class="stat"><div class="num green">'+total+'</div><div class="lbl">IN APP</div></div>'+
     '<div class="stat"><div class="num indigo">'+due+'</div><div class="lbl">DUE NOW</div></div></div>';
  if(due>0)h+='<button class="btn rose block" onclick="startKanjiReview()" style="margin-bottom:16px">Review '+due+' kanji →</button>';
  KANJI.forEach((set,si)=>{
    const learned=set.list.filter(x=>state.kanji[x.k]).length;
    h+='<div class="unit ready" onclick="openKanjiSet('+si+')"><div class="wknum">'+set.list.length+'<small>字</small></div>'+
       '<div class="info"><b>'+set.name+'</b><div class="cando jp" style="font-size:15px;color:var(--ink);letter-spacing:1px">'+set.list.map(x=>x.k).join(" ")+'</div></div>'+
       '<div class="muted" style="font-size:12px;font-weight:700">'+learned+'/'+set.list.length+'</div></div>';
  });
  document.getElementById("v-kanji").innerHTML=h;
}
function openKanjiSet(si){
  const set=KANJI[si];
  let h='<button class="back" onclick="go(\'kanji\')">‹ Kanji</button><h2 class="title">'+set.name+'</h2><div class="kgrid">';
  set.list.forEach((x,ki)=>{
    const kn=!!state.kanji[x.k];
    h+='<div class="ktile'+(kn?' kn':'')+'" onclick="openKanji('+si+','+ki+')"><div class="kc jp">'+x.k+'</div><div class="km">'+x.m+'</div></div>';
  });
  h+='</div>';
  document.getElementById("v-kanji").innerHTML=h;window.scrollTo(0,0);
}
function openKanji(si,ki){
  const x=KANJI[si].list[ki];const known=!!state.kanji[x.k];
  let h='<button class="back" onclick="openKanjiSet('+si+')">‹ '+KANJI[si].name+'</button>';
  h+='<div class="kbig jp">'+x.k+'</div>';
  h+='<p style="text-align:center;font-size:19px;font-weight:650;margin:0 0 2px">'+x.m+'</p>';
  h+='<p class="muted" style="text-align:center;margin:0 0 16px">'+x.s+' strokes</p>';
  h+='<div class="krow"><div class="kcell"><span>ON’YOMI</span><b class="jp">'+x.on+'</b></div><div class="kcell"><span>KUN’YOMI</span><b class="jp">'+x.kun+'</b></div></div>';
  h+='<div class="sec"><div class="lab"><span class="d"></span>Example words</div>';
  x.ex.forEach(e=>{h+='<div class="ex"><div class="jl jp"><span>'+e[0]+'</span>'+spkBtn(e[0])+'</div><div class="rom">'+e[1]+'</div><div class="en">'+e[2]+'</div></div>';});
  h+='</div>';
  h+='<button class="btn rose block" onclick="kLearn(\''+x.k+'\','+si+')" style="margin-bottom:10px">'+(known?'✓ In review — study again':'Add to review deck')+'</button>';
  document.getElementById("v-kanji").innerHTML=h;window.scrollTo(0,0);
}
function kLearn(k,si){kSeed(k);recordStudy();toast("Added "+k+" to your review deck");openKanjiSet(si);}

let ksession={queue:[],idx:0,flipped:false,reviewed:0};
function startKanjiReview(){
  let ids=kDue();if(!ids.length)ids=Object.keys(state.kanji);
  ids=ids.sort(()=>Math.random()-.5).slice(0,20);
  if(!ids.length){toast("Add some kanji from a set first");return;}
  ksession={queue:ids,idx:0,flipped:false,reviewed:0};drawKanjiCard();window.scrollTo(0,0);
}
function drawKanjiCard(){
  if(ksession.idx>=ksession.queue.length)return kReviewDone();
  const k=ksession.queue[ksession.idx];const x=kFind(k);ksession.flipped=false;
  let h='<div class="deck"><button class="back" onclick="go(\'kanji\')">‹ Exit</button>'+
    '<p class="muted" style="text-align:center;font-size:12px;font-weight:700">'+(ksession.idx+1)+' / '+ksession.queue.length+'</p>'+
    '<div class="fcard" onclick="kflip()"><div class="fc-inner" id="kfci">'+
      '<div class="fc-face fc-front"><div class="big jp" style="font-size:90px">'+k+'</div><div class="hint">tap for reading &amp; meaning</div></div>'+
      '<div class="fc-face fc-back"><div class="mn">'+x.m+'</div>'+
        '<div class="rd jp" style="font-size:19px;margin-top:12px;line-height:1.6">ON '+x.on+'<br>KUN '+x.kun+'</div>'+
        '<div style="margin-top:14px">'+spkBtn(x.ex[0][0])+'</div></div>'+
    '</div></div>';
  h+='<div id="kgrades" style="visibility:hidden">'+leechBadge(state.kanji[k])+gradesHTML(state.kanji[k],'kgrade')+'</div></div>';
  document.getElementById("v-kanji").innerHTML=h;
}
function kflip(){const f=document.getElementById("kfci");if(!f)return;ksession.flipped=!ksession.flipped;f.classList.toggle("flip",ksession.flipped);document.getElementById("kgrades").style.visibility=ksession.flipped?"visible":"hidden";if(ksession.flipped){const x=kFind(ksession.queue[ksession.idx]);speak(x.ex[0][0]);}}
function kgrade(g){const k=ksession.queue[ksession.idx];const s=state.kanji[k];
  if(sched(s,g))ksession.queue.push(k);
  ksession.reviewed++;save();ksession.idx++;drawKanjiCard();
}
function kReviewDone(){recordStudy();if(chainStep===2){chainStep=3;runChain();return;}document.getElementById("v-kanji").innerHTML='<div class="empty"><div class="em">'+svgIcon(IC.trophy,42)+'</div><p><b>Kanji review done!</b><br>You reviewed '+ksession.reviewed+' kanji.</p><button class="btn rose" onclick="go(\'kanji\')">Finish</button></div>';}

function openVocabSet(si){var set=VOCAB[si];var h='<button class="back" onclick="go(\'vocab\')">‹ Vocabulary</button><h2 class="title">'+set.name+'</h2><div class="ugrid">';

  });

function openVocab(si,ki){var x=VOCAB[si].list[ki];var kn=!!state.vocab[x.k];

function vLearn(k,si){vSeed(k);recordStudy();toast("Added "+k+" to review");openVocabSet(si);}
var vsession={queue:[],idx:0,flipped:false,reviewed:0,mode:"new"};
function startVocabReview(){var ids=vDue();if(!ids.length)ids=Object.keys(state.vocab);ids=ids.sort(function(){return Math.random()-.5;}).slice(0,20);if(!ids.length){toast("Add some words from a set first");return;}vsession={queue:ids,idx:0,flipped:false,reviewed:0,mode:"new"};drawVocabCard();window.scrollTo(0,0);}
function startReviewDeck(){rSeed();var ids=rDue();if(!ids.length)ids=Object.keys(state.rev);ids=ids.sort(function(){return Math.random()-.5;}).slice(0,20);vsession={queue:ids,idx:0,flipped:false,reviewed:0,mode:"rev"};drawVocabCard();window.scrollTo(0,0);}
function drawVocabCard(){
  if(vsession.idx>=vsession.queue.length)return vReviewDone();
  var key=vsession.queue[vsession.idx];vsession.flipped=false;var front,reading,mean;
  if(vsession.mode==="new"){var x=vFind(key);front=x.k;reading=x.r;mean=x.m;}else{front=key;reading="";mean="";}
  var h='<div class="deck"><button class="back" onclick="go(\'vocab\')">‹ Exit</button><p class="muted" style="text-align:center;font-size:12px;font-weight:700">'+(vsession.idx+1)+' / '+vsession.queue.length+'</p>';
  h+='<div class="fcard" onclick="vflip()"><div class="fc-inner" id="vfci"><div class="fc-face fc-front"><div class="big jp" style="font-size:'+(front.length>6?"30":"44")+'px">'+jpf(front)+'</div><div class="hint">'+(vsession.mode==="new"?"tap for meaning":"recall the meaning")+'</div></div>';
  h+='<div class="fc-face fc-back">'+(mean?'<div class="mn">'+mean+'</div>':'')+(reading?'<div class="rd jp" style="margin-top:8px">'+jpf(reading)+'</div>':'<div class="rd jp">'+jpf(front)+'</div>')+'<div style="margin-top:14px">'+spkBtn(front)+'</div></div></div></div>';
  h+='<div id="vgrades" style="visibility:'+(vsession.mode==="rev"?"visible":"hidden")+'">'+leechBadge(vsession.mode==="new"?state.vocab[key]:state.rev[key])+gradesHTML(vsession.mode==="new"?state.vocab[key]:state.rev[key],'vgrade')+'</div></div>';
  document.getElementById("v-vocab").innerHTML=h;
}
function vflip(){var f=document.getElementById("vfci");if(!f)return;vsession.flipped=!vsession.flipped;f.classList.toggle("flip",vsession.flipped);if(vsession.mode==="new")document.getElementById("vgrades").style.visibility=vsession.flipped?"visible":"hidden";if(vsession.flipped){speak(vsession.queue[vsession.idx]);}}
function vgrade(g){var key=vsession.queue[vsession.idx];var s=vsession.mode==="new"?state.vocab[key]:state.rev[key];
  if(sched(s,g))vsession.queue.push(key);
  vsession.reviewed++;save();vsession.idx++;drawVocabCard();}
function vReviewDone(){recordStudy();if(chainStep===1){chainStep=2;runChain();return;}document.getElementById("v-vocab").innerHTML='<div class="empty"><div class="em">'+svgIcon(IC.trophy,42)+'</div><p><b>Done!</b><br>You reviewed '+vsession.reviewed+' words.</p><button class="btn rose" onclick="go(\'vocab\')">Finish</button></div>';}

const PGROUPS=[{"name": "Core · they mark each word's role", "note": "は が を に で …", "list": [{"p": "は", "role": "topic", "img": "Spotlight on the topic — 'as for ~'. Sets what the sentence is about, then comments on it.", "ex": [["私は学生です。", "As for me, I'm a student."], ["今日は寒いです。", "As for today, it's cold."]]}, {"p": "が", "role": "subject / new info", "img": "Points at WHO or WHAT does it. Introduces new or specific information.", "ex": [["だれが来ますか。", "Who is coming?"], ["雨が降っています。", "It's raining."]]}, {"p": "を", "role": "direct object", "img": "The thing the action lands on.", "ex": [["本を読みます。", "I read a book."], ["水を飲みます。", "I drink water."]]}, {"p": "に", "role": "target point", "img": "An arrow landing AT a point: destination, clock time, location of existence, or receiver.", "ex": [["学校に行きます。", "I go to school."], ["七時に起きます。", "I get up at seven."]]}, {"p": "で", "role": "place of action / means", "img": "The stage where an action happens, or the tool used.", "ex": [["図書館で勉強します。", "I study at the library."], ["電車で行きます。", "I go by train."]]}, {"p": "へ", "role": "direction", "img": "An arrow pointing 'toward'. Softer than に. (Written へ, said 'e'.)", "ex": [["東京へ行きます。", "I head toward Tokyo."], ["家へ帰ります。", "I head home."]]}, {"p": "と", "role": "with / and / quote", "img": "Things joined together: 'with' a person, 'and' for a full list, or marking a quote.", "ex": [["友達と話します。", "I talk with a friend."], ["パンとたまごを食べます。", "I eat bread and eggs."]]}, {"p": "も", "role": "also / too", "img": "Addition — 'also, too'. Replaces は, が, or を.", "ex": [["私も学生です。", "I'm a student too."], ["肉も魚も食べません。", "I eat neither meat nor fish."]]}, {"p": "の", "role": "of / 's / linker", "img": "Glue between two nouns: possession, type, or belonging.", "ex": [["私の本です。", "It's my book."], ["日本語の先生です。", "(He) is a Japanese teacher."]]}, {"p": "から", "role": "from / because", "img": "A starting point in space or time, or the reason something happens.", "ex": [["九時から仕事です。", "Work is from nine."], ["寒いから、帰ります。", "Because it's cold, I'll go home."]]}, {"p": "まで", "role": "until / up to", "img": "An end point — the limit you go up to.", "ex": [["五時まで待ちます。", "I'll wait until five."], ["駅まで歩きます。", "I walk up to the station."]]}, {"p": "より", "role": "than", "img": "The baseline you compare against.", "ex": [["電車はバスより速いです。", "The train is faster than the bus."], ["去年より忙しいです。", "I'm busier than last year."]]}]}, {"name": "Focus · they add emphasis or limit", "note": "だけ しか でも …", "list": [{"p": "だけ", "role": "only / just", "img": "Draws a tight box around one thing — 'only that, nothing more'.", "ex": [["水だけ飲みます。", "I drink only water."], ["少しだけください。", "Just a little, please."]]}, {"p": "しか", "role": "only (+ negative)", "img": "Same 'only', but always with a negative verb — 'there's nothing but ~'. Feels like 'not enough'.", "ex": [["お金が千円しかありません。", "I have only 1,000 yen."], ["ひらがなしか読めません。", "I can only read hiragana."]]}, {"p": "でも", "role": "…or something / even", "img": "Softens a suggestion ('…or something') or means 'even ~'.", "ex": [["コーヒーでもいかがですか。", "How about coffee or something?"], ["子供でもできます。", "Even a child can do it."]]}, {"p": "ばかり", "role": "nothing but / only", "img": "Complains that it's always the same thing — 'does nothing but ~'.", "ex": [["ゲームばかりしています。", "(He) does nothing but play games."], ["肉ばかり食べます。", "(He) eats nothing but meat."]]}, {"p": "など", "role": "and so on / etc.", "img": "Gives examples and leaves the list open — 'things like ~'. Often after や.", "ex": [["パンやたまごなどを買いました。", "I bought bread, eggs, and so on."], ["お茶などはどうですか。", "How about tea or something?"]]}, {"p": "ぐらい", "role": "about / approximately", "img": "A rough amount, not exact — 'around ~'. (くらい / ぐらい, same word.)", "ex": [["一時間ぐらい待ちました。", "I waited about an hour."], ["千円ぐらいです。", "It's about 1,000 yen."]]}]}, {"name": "Connecting · they join ideas", "note": "ので けど のに し", "list": [{"p": "ので", "role": "because (soft)", "img": "Joins two clauses with a reason, but gentler and more matter-of-fact than から.", "ex": [["寒いので、窓を閉めます。", "Because it's cold, I'll close the window."], ["忙しいので、行けません。", "Since I'm busy, I can't go."]]}, {"p": "けど", "role": "but / though", "img": "Links two clauses with a mild contrast — 'X, but Y'. (けど = casual, が = formal.)", "ex": [["高いですけど、買います。", "It's expensive, but I'll buy it."], ["すみませんけど、…", "Excuse me, but…"]]}, {"p": "のに", "role": "even though", "img": "Contrast with a twist — the result is surprising or disappointing.", "ex": [["勉強したのに、わかりません。", "Even though I studied, I don't get it."], ["高いのに、おいしくないです。", "It's expensive, yet not tasty."]]}, {"p": "し", "role": "and what's more", "img": "Stacks reasons or qualities — 'X, and on top of that Y'.", "ex": [["この店は安いし、おいしいです。", "This place is cheap, and tasty too."], ["近いし、便利です。", "It's close, and convenient."]]}]}, {"name": "Sentence-ending · they add feeling", "note": "か ね よ よね", "list": [{"p": "か", "role": "question / or", "img": "At the end, makes a question. Between two nouns, it means 'or'.", "ex": [["学生ですか。", "Are you a student?"], ["コーヒーかお茶を飲みます。", "I'll drink coffee or tea."]]}, {"p": "ね", "role": "right? / agreement", "img": "Seeks agreement or softens — 'right?', 'isn't it?'. Assumes you both feel the same.", "ex": [["いい天気ですね。", "Nice weather, isn't it?"], ["おいしいですね。", "It's tasty, isn't it?"]]}, {"p": "よ", "role": "I'm telling you", "img": "Adds new information or emphasis the listener doesn't know yet — like a gentle '!'.", "ex": [["あぶないですよ。", "It's dangerous, you know!"], ["もう終わりましたよ。", "It's already finished, you know."]]}, {"p": "よね", "role": "right? (confirming)", "img": "ね + よ: you think something is true and you're checking the other person agrees.", "ex": [["明日ですよね。", "It's tomorrow, right?"], ["これでいいですよね。", "This is fine, right?"]]}]}];

const SENTS=[{"en": "I drink water.", "ch": ["水を", "飲みます"], "why": "The verb goes LAST. The object (水を, 'water') sits right before it."}, {"en": "I go to school.", "ch": ["学校へ", "行きます"], "why": "Destination (学校へ) first, verb (行きます) last. Japanese always ends on the verb."}, {"en": "As for me, I'm a student.", "ch": ["私は", "学生です"], "why": "Topic first (私は = 'as for me'), then the comment about it (学生です). です acts like the final verb."}, {"en": "I read a book at the library.", "ch": ["図書館で", "本を", "読みます"], "why": "Place of the action (図書館で) → object (本を) → verb. The object hugs the verb; the place sits further left."}, {"en": "I read a book at the library every day.", "ch": ["毎日", "図書館で", "本を", "読みます"], "why": "Time (毎日) opens the sentence, then place (図書館で), then object (本を), then verb. Time → place → object → verb."}, {"en": "I get up at seven every morning.", "ch": ["毎朝", "七時に", "起きます"], "why": "Both time words go up front (毎朝, then the more specific 七時に), and the verb closes it."}, {"en": "I write a letter to my mother.", "ch": ["母に", "手紙を", "書きます"], "why": "The receiver (母に, 'to mother') comes before the object (手紙を), then the verb. に-receiver precedes を-object."}, {"en": "Yesterday I watched a movie with a friend.", "ch": ["昨日", "友達と", "映画を", "見ました"], "why": "Time (昨日) → companion (友達と) → object (映画を) → verb. Each piece is tagged by its particle, so the order is natural, not random."}, {"en": "I eat breakfast at home in the morning.", "ch": ["朝", "家で", "朝ご飯を", "食べます"], "why": "Time (朝) → place (家で) → object (朝御飯を) → verb. The classic time–place–object–verb flow."}, {"en": "This is my book.", "ch": ["これは", "私の", "本です"], "why": "私の ('my') is a modifier, so it sits right before what it describes (本). Modifiers always come BEFORE the noun."}, {"en": "The tall person is my teacher.", "ch": ["背の高い", "人は", "先生です"], "why": "背の高い ('tall') describes 人, so the whole describing phrase comes before 人. Then topic 人は, then the comment."}, {"en": "I want to go to Japan next year.", "ch": ["来年", "日本へ", "行きたいです"], "why": "Time (来年) first, destination (日本へ) next, and the desire-verb (行きたいです) last — wanting still ends the sentence."}, {"en": "Because it's cold, I'll go home.", "ch": ["寒いから", "家へ", "帰ります"], "why": "The reason clause (寒いから, 'because it's cold') comes first to set up the result, then destination, then verb."}, {"en": "I think this movie is interesting.", "ch": ["この映画は", "面白いと", "思います"], "why": "The quoted thought (面白いと) sits right before 思います. 思います ('I think') is the main verb, so it lands last."}];

var builder={idx:0,picked:[],pool:[],checked:false};
function startBuilder(){builder={idx:0,picked:[],pool:[],checked:false};loadBuilderItem();}
function loadBuilderItem(){var it=SENTS[builder.idx];builder.picked=[];builder.pool=it.ch.slice().sort(function(){return Math.random()-.5;});builder.checked=false;drawBuilder();}
function drawBuilder(){
  var it=SENTS[builder.idx];var total=it.ch.length;
  var h='<button class="back" onclick="go(\'practice\')">‹ Practice</button>';
  h+='<p class="muted" style="font-size:12px;font-weight:700;letter-spacing:.5px">SENTENCE '+(builder.idx+1)+' / '+SENTS.length+'</p>';
  h+='<p class="muted" style="margin:0 0 4px;font-size:13px">Build this in Japanese:</p><div class="qq" style="font-size:19px;margin-bottom:14px">'+it.en+'</div>';
  h+='<div class="bslot">';
  if(builder.picked.length===0)h+='<span class="muted" style="font-size:13px">Tap the words below, in order →</span>';
  builder.picked.forEach(function(c,i){h+='<button class="btile in jp" onclick="'+(builder.checked?'':'unpick('+i+')')+'">'+jpf(c)+'</button>';});
  h+='</div>';
  h+='<div class="btiles">';
  builder.pool.forEach(function(c,i){h+='<button class="btile jp" onclick="'+(builder.checked?'':'pick('+i+')')+'">'+jpf(c)+'</button>';});
  h+='</div>';
  if(!builder.checked&&builder.picked.length===total)h+='<button class="btn rose block" onclick="checkBuilder()" style="margin-top:18px">Check order</button>';
  if(builder.checked){
    var ok=JSON.stringify(builder.picked)===JSON.stringify(it.ch);
    h+='<div class="fb show '+(ok?'ok':'no')+'" style="margin-top:18px">'+(ok?'<b>✓ That’s the natural order.</b>':'<b>The most natural order is:</b><br><span class="jp" style="font-size:18px">'+jpf(it.ch.join(""))+'</span>')+'</div>';
    h+='<div class="when" style="margin-top:10px"><b style="color:var(--ink)">Why:</b> '+it.why+'</div>';
    h+='<div style="text-align:center;margin:12px 0">'+spkBtn(it.ch.join(""))+'</div>';
    h+='<button class="btn rose block" onclick="nextBuilder()">'+((builder.idx+1>=SENTS.length)?'Finish':'Next sentence →')+'</button>';
  }
  document.getElementById("v-build").innerHTML=h;showOnly("v-build");
}
function pick(i){builder.picked.push(builder.pool.splice(i,1)[0]);drawBuilder();}
function unpick(i){builder.pool.push(builder.picked.splice(i,1)[0]);drawBuilder();}
function checkBuilder(){builder.checked=true;recordStudy();save();drawBuilder();}
function nextBuilder(){if(builder.idx+1>=SENTS.length){builderDone();}else{builder.idx++;loadBuilderItem();}}
function builderDone(){document.getElementById("v-build").innerHTML='<button class="back" onclick="go(\'practice\')">‹ Practice</button><div class="qwrap result"><div class="big" style="color:var(--green)">✓</div><h3 style="margin:10px 0 18px">You ordered all '+SENTS.length+' sentences!</h3><button class="btn rose block" onclick="startBuilder()" style="margin-bottom:10px">Go again</button><button class="btn ghost block" onclick="go(\'practice\')">Back to Practice</button></div>';showOnly("v-build");}
function showOrderGuide(){
  var flow=["When","Topic は","Where で","Whom に","What を","Verb"];
  var h='<button class="back" onclick="renderPractice()">‹ Practice</button><p class="eyebrow">Sentence order</p><h2 class="title">Why Japanese word order works</h2>';
  h+='<div class="card" style="background:var(--surface-3)"><p class="muted" style="margin:0 0 10px;font-size:12px;font-weight:700;letter-spacing:.5px">THE DEFAULT FLOW</p><div class="btiles" style="align-items:center">'+flow.map(function(s,i){return (i?'<span style="color:var(--faint)">›</span>':'')+'<span class="btile jp" style="font-size:13px">'+s+'</span>';}).join('')+'</div></div>';
  var rules=[
   ["The verb always comes last.","Every sentence builds toward the verb (or です). Whatever else happens, the action word lands at the very end."],
   ["Particles do the job English does with order.","Because は・が・を・に・で tag each word’s role, you don’t need a fixed order. The tags carry the meaning, so the middle pieces can shift without confusion."],
   ["There’s still a natural order.","Set the scene first — time, then place — then move inward toward the verb, with the object を right before it. Time → place → who → what → verb."],
   ["Modifiers come BEFORE what they modify.","Adjectives and whole describing clauses sit in front of their noun: 大きい家 (big house), 私が買った本 (the book I bought)."],
   ["The topic (は) sits up front.","は sets the stage — ‘as for ~’ — so it usually opens the sentence, before the details."],
  ];
  rules.forEach(function(r,i){h+='<div class="sec"><div class="lab"><span class="d"></span>'+(i+1)+'. '+r[0]+'</div><div class="when">'+r[1]+'</div></div>';});
  document.getElementById("v-practice").innerHTML=h;window.scrollTo(0,0);
}

const CONTRASTS=[{"t": "は vs が", "q": "topic vs. new info", "rule": "は sets the TOPIC — what you're talking about (often already known, or a contrast). が picks out NEW or specific info and answers 'who?/what?'.", "ex": [["私は学生です。", "As for me, I'm a student. (just telling you about myself)"], ["私が学生です。", "I'm the one who's the student. (identifying — of all people)"]], "tip": "Brand-new info and answers to 'who?' take が. Scene-setting and contrast take は."}, {"t": "に vs で", "q": "a point vs. where action happens", "rule": "に marks a fixed point — where something IS, or a destination. で marks where an ACTION takes place.", "ex": [["図書館にいます。", "I'm at the library. (simply being there)"], ["図書館で勉強します。", "I study at the library. (an action happens there)"]], "tip": "No action, just location or existence → に. Something is happening → で."}, {"t": "に vs へ", "q": "arrival vs. direction", "rule": "Both point to a destination. へ stresses the DIRECTION you're heading; に stresses the ARRIVAL point (and marks times). For going places, they often swap freely.", "ex": [["東京へ行きます。", "I'm heading toward Tokyo."], ["東京に着きます。", "I arrive in Tokyo."]], "tip": "Reaching/arriving, or a clock time → に. Just the direction you face → へ."}, {"t": "だけ vs しか", "q": "'only' vs. 'only' (+ negative)", "rule": "Both mean 'only'. だけ is neutral and takes a normal verb. しか always needs a NEGATIVE verb and adds the feeling 'that's all — not enough'.", "ex": [["千円だけあります。", "I have just 1,000 yen. (neutral fact)"], ["千円しかありません。", "I have only 1,000 yen. (…and that's not much)"]], "tip": "Plain 'only' → だけ. 'Only… and it's not enough' → しか + ない."}, {"t": "から vs ので", "q": "because (strong) vs. because (soft)", "rule": "Both mean 'because'. から is your personal, subjective reason and can sound stronger. ので is softer and more objective — better for polite explanations.", "ex": [["寒いから、帰ります。", "It's cold, so I'm going home. (my reason)"], ["寒いので、帰ります。", "Since it's cold, I'll head home. (softer, polite)"]], "tip": "Explaining to a boss → ので. Casual 'because I said so' → から."}, {"t": "ね vs よ", "q": "agreement vs. informing", "rule": "ね seeks agreement about something you BOTH already know. よ gives the listener information they DON'T have yet.", "ex": [["おいしいですね。", "It's tasty, isn't it? (we're both tasting it)"], ["おいしいですよ。", "It's tasty, you know! (telling you something new)"]], "tip": "Shared feeling → ね. New info or a heads-up → よ."}, {"t": "と vs や", "q": "full list vs. partial list", "rule": "と lists things COMPLETELY — exactly these, nothing else. や gives a PARTIAL list — these and others (often closed with など).", "ex": [["本とノートを買いました。", "I bought a book and a notebook. (just those two)"], ["本やノートを買いました。", "I bought a book, a notebook, and so on."]], "tip": "Complete list → と. 'Such as / and others' → や (…など)."}, {"t": "が vs を", "q": "object — but watch likes & abilities", "rule": "Normally を marks the object. But likes and abilities — 好き, きらい, 上手, わかる, できる, ほしい — take が, because they describe a STATE, not an action done to something.", "ex": [["すしが好きです。", "I like sushi. (not すしを)"], ["日本語がわかります。", "I understand Japanese. (not 日本語を)"]], "tip": "好き・きらい・上手・わかる・できる・ほしい → が, never を."}];
