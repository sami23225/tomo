const PLESSONS=[{"p": "は", "name": "Topic marker", "g": "Core", "when": "Use は to announce what the sentence is ABOUT — 'as for ~'. It sets the stage with something already known, then you comment on it. It's also the go-to for contrast ('this one yes, that one no').", "how": ["Topic：〜は …です／…ます", "Contrast：Aは○、Bは×"], "ex": [["私は学生です。", "As for me, I'm a student."], ["今日は寒いです。", "Today, it's cold."], ["肉は食べますが、魚は食べません。", "I eat meat, but not fish."]], "watch": ["は is written は but pronounced 'wa'.", "Don't confuse with が — は sets a known topic; が introduces new info (see the が lesson)."]}, {"p": "が", "name": "Subject / new info", "g": "Core", "when": "Use が to point at WHO or WHAT does something, especially when it's new information or the answer to 'who?/what?'. Also required with likes and abilities (好き・できる・わかる・ある).", "how": ["New subject：〜が あります／います", "Question word：だれが、なにが", "With states：〜が 好き／上手／わかる"], "ex": [["だれが来ますか。", "Who is coming?"], ["雨が降っています。", "It's raining."], ["日本語がわかります。", "I understand Japanese."]], "watch": ["Answers to だれ／なに take が, not は.", "好き・きらい・上手・できる・わかる・ほしい take が (not を)."]}, {"p": "を", "name": "Object marker", "g": "Core", "when": "Use を to mark the direct object — the thing a verb acts on. It also marks the place you move THROUGH with motion verbs (通る, 散歩する).", "how": ["Object：〜を 食べる／見る／読む", "Path：道を歩く、公園を散歩する"], "ex": [["本を読みます。", "I read a book."], ["水を飲みます。", "I drink water."], ["公園を散歩します。", "I take a walk through the park."]], "watch": ["Even in the negative, the object keeps を: 魚を食べません.", "Likes/abilities use が, not を: すしが好きです."]}, {"p": "に", "name": "Target point", "g": "Core", "when": "Use に for a specific point: a destination, a clock time, where something exists, or the person who receives. Think of an arrow landing exactly on a spot.", "how": ["Destination：〜に 行く／来る／帰る", "Time：三時に、月曜日に", "Existence：〜に いる／ある", "Receiver：〜に あげる／教える／電話する"], "ex": [["学校に行きます。", "I go to school."], ["七時に起きます。", "I get up at seven."], ["父に電話します。", "I call my father."]], "watch": ["Only specific times take に (七時に). Relative times don't: 今日、明日, きのう.", "For existence use に (place に いる/ある); for actions use で."]}, {"p": "で", "name": "Place of action / means", "g": "Core", "when": "Use で for WHERE an action happens, or the tool/means/language used to do it. If something is happening there, it's で.", "how": ["Action place：〜で 勉強する／食べる", "Means/tool：ペンで、電車で、日本語で"], "ex": [["図書館で勉強します。", "I study at the library."], ["電車で行きます。", "I go by train."], ["日本語で話します。", "I speak in Japanese."]], "watch": ["No action, just existence/location → に (うちにいます). Action there → で (うちで食べます).", "'By means of' (transport, tool, language) is always で."]}, {"p": "へ", "name": "Direction", "g": "Core", "when": "Use へ for the direction you're heading — 'toward'. It's softer and less exact than に, and for going places the two often swap.", "how": ["Direction：〜へ 行く／来る／帰る"], "ex": [["東京へ行きます。", "I head toward Tokyo."], ["家へ帰ります。", "I head home."]], "watch": ["Written へ, pronounced 'e'.", "に stresses arrival/a fixed point; へ stresses the direction. For destinations, both are usually fine."]}, {"p": "と", "name": "With / and / quote", "g": "Core", "when": "Use と to join things tightly: 'with' a person, 'and' for a complete list (exactly these), or to mark a quote before 言う/思う.", "how": ["With：〜と 話す／会う／行く", "And (full list)：AとB", "Quote：「…」と 言う／思う"], "ex": [["友達と話します。", "I talk with a friend."], ["肉と魚を買います。", "I buy meat and fish."], ["「行く」と言いました。", "(He) said, \"I'll go.\""]], "watch": ["と = a complete list; や = a partial list ('…and so on').", "For 'meet with', 友達と会う and 友達に会う are both fine."]}, {"p": "も", "name": "Also / too", "g": "Core", "when": "Use も to add — 'also, too'. It replaces は, が, or を (it never stacks on them). Repeat it (も…も) for 'both … and' or, with a negative, 'neither … nor'.", "how": ["Also：〜も …です", "Both/neither：Aも Bも"], "ex": [["私も学生です。", "I'm a student too."], ["肉も魚も食べます。", "I eat both meat and fish."], ["肉も魚も食べません。", "I eat neither meat nor fish."]], "watch": ["も replaces は/が/を — say 私も (not 私はも).", "With a negative verb, も…も means 'neither … nor'."]}, {"p": "の", "name": "Of / 's / linker", "g": "Core", "when": "Use の to glue two nouns together — possession, type, or belonging. 'A の B' = a B that relates to A. It can also stand in for a noun ('the red one' = 赤いの).", "how": ["Link：AのB（私の本、日本語の先生）", "Stand-in：赤いの、大きいの"], "ex": [["私の本です。", "It's my book."], ["日本語の先生です。", "(She) is a teacher of Japanese."], ["駅の近くにあります。", "It's near the station."]], "watch": ["The order is owner + の + thing: 私の本 (my book), not 本の私."]}, {"p": "から", "name": "From / because", "g": "Core", "when": "Use から for a starting point in space or time ('from'), or to give a reason ('because'). As a reason it's your subjective 'because', and it can sound stronger than ので.", "how": ["From：九時から、駅から", "Because：〜から、…（plain or polite + から）"], "ex": [["九時から仕事です。", "Work is from nine."], ["寒いから、帰ります。", "Because it's cold, I'll go home."], ["時間がないから、急ぎます。", "I'll hurry because there's no time."]], "watch": ["から…まで = 'from … to'.", "から = your personal reason; ので = softer/more objective (see the ので lesson)."]}, {"p": "まで", "name": "Until / up to", "g": "Core", "when": "Use まで for the end point — the limit you go up to, in time or space.", "how": ["Until/up to：五時まで、駅まで"], "ex": [["五時まで待ちます。", "I'll wait until five."], ["駅まで歩きます。", "I walk up to the station."], ["朝から夜まで働きます。", "I work from morning until night."]], "watch": ["までに (by a deadline) is different from まで (up until): 五時までに帰る = be back BY five."]}, {"p": "より", "name": "Than", "g": "Core", "when": "Use より for the baseline in a comparison — 'than'. The thing you prefer takes のほうが.", "how": ["Comparison：AはBより 〜（AはBより速い）", "Prefer：Bより Aのほうが好き"], "ex": [["電車はバスより速いです。", "The train is faster than the bus."], ["去年より忙しいです。", "I'm busier than last year."], ["夏より冬のほうが好きです。", "I like winter more than summer."]], "watch": ["The order is: [winner] は [loser] より. Mixing them up flips the meaning."]}, {"p": "だけ", "name": "Only / just", "g": "Focus", "when": "Use だけ to draw a tight box around one thing — 'only that, nothing more'. It's neutral and works with a normal (positive) verb.", "how": ["Only：〜だけ（水だけ、少しだけ）"], "ex": [["水だけ飲みます。", "I drink only water."], ["少しだけください。", "Just a little, please."], ["英語だけ話せます。", "I can speak only English."]], "watch": ["だけ + positive verb; しか needs a NEGATIVE verb (see the しか lesson)."]}, {"p": "しか", "name": "Only (+ negative)", "g": "Focus", "when": "Use しか with a NEGATIVE verb to say 'only / nothing but ~'. It adds a feeling of 'that's all — not enough'.", "how": ["Only (not enough)：〜しか …ない／ません"], "ex": [["千円しかありません。", "I have only 1,000 yen."], ["ひらがなしか読めません。", "I can only read hiragana."], ["水しか飲みません。", "I drink nothing but water."]], "watch": ["The verb must be negative: 千円しかありません (not あります).", "Plain, neutral 'only' → だけ."]}, {"p": "でも", "name": "…or something / even", "g": "Focus", "when": "Use でも to soften a suggestion ('…or something') or to mean 'even ~'. Great for casual invitations.", "how": ["Suggestion：〜でも どうですか", "Even：〜でも（子供でも）"], "ex": [["コーヒーでもいかがですか。", "How about coffee or something?"], ["子供でもできます。", "Even a child can do it."], ["いつでもいいです。", "Any time is fine."]], "watch": ["Note でも also starts a sentence meaning 'but' — a different use."]}, {"p": "ばかり", "name": "Nothing but / only", "g": "Focus", "when": "Use ばかり to complain that it's always the same thing — 'does nothing but ~'.", "how": ["Nothing but：〜ばかり している"], "ex": [["ゲームばかりしています。", "(He) does nothing but play games."], ["肉ばかり食べます。", "(He) eats nothing but meat."]], "watch": ["ばかり often carries a mild criticism ('too much of the same')."]}, {"p": "など", "name": "And so on / etc.", "g": "Focus", "when": "Use など after examples to leave the list open — 'things like ~, and so on'. Often paired with や.", "how": ["Examples：AやB など"], "ex": [["パンやたまごなどを買いました。", "I bought bread, eggs, and so on."], ["お茶などはどうですか。", "How about some tea or something?"]], "watch": ["や lists a few examples; など closes it with 'etc.'"]}, {"p": "ぐらい", "name": "About / approximately", "g": "Focus", "when": "Use ぐらい (or くらい) for a rough amount — 'around ~', not exact.", "how": ["Approx：〜ぐらい（一時間ぐらい）"], "ex": [["一時間ぐらい待ちました。", "I waited about an hour."], ["千円ぐらいです。", "It's about 1,000 yen."]], "watch": ["ぐらい and くらい are the same word — both are fine."]}, {"p": "ので", "name": "Because (soft)", "g": "Connecting", "when": "Use ので to give a reason gently and objectively. It's smoother than から and better for polite explanations and excuses.", "how": ["Because：〜ので、…（plain form + ので; なので after nouns/な-adj）"], "ex": [["寒いので、窓を閉めます。", "Because it's cold, I'll close the window."], ["忙しいので、行けません。", "Since I'm busy, I can't go."], ["元気なので、大丈夫です。", "I'm fine, so no problem."]], "watch": ["Nouns/な-adjectives take な before ので: 元気なので.", "から = stronger/personal; ので = softer/polite."]}, {"p": "けど", "name": "But / though", "g": "Connecting", "when": "Use けど to link two clauses with a mild contrast — 'X, but Y'. It's the casual cousin of が; けれど / けれども are more formal.", "how": ["Contrast：〜けど、…"], "ex": [["高いですけど、買います。", "It's expensive, but I'll buy it."], ["難しいけど、楽しいです。", "It's hard, but fun."], ["すみませんけど、…", "Excuse me, but…"]], "watch": ["けど softens requests and openings: すみませんけど… ('sorry, but…')."]}, {"p": "のに", "name": "Even though", "g": "Connecting", "when": "Use のに for a contrast with a twist — the result is surprising or disappointing. 'Even though X, Y (unexpectedly).'", "how": ["Unexpected：〜のに、…"], "ex": [["勉強したのに、わかりません。", "Even though I studied, I don't get it."], ["高いのに、おいしくないです。", "It's expensive, yet not tasty."]], "watch": ["のに carries emotion (surprise/complaint); けど is neutral contrast."]}, {"p": "し", "name": "And what's more", "g": "Connecting", "when": "Use し to stack reasons or qualities — 'X, and on top of that Y'. It hints there are more reasons than you're listing.", "how": ["Stacking：〜し、〜し、…"], "ex": [["この店は安いし、おいしいです。", "This place is function findPLesson(p){for(var i=0;i<PLESSONS.length;i++){if(PLESSONS[i].p===p)return PLESSONS[i];}return null;}
function renderParticleLessons(){
  var h='<button class="back" onclick="renderPractice()">‹ Practice</button><p class="eyebrow">Particles</p><h2 class="title">Particle lessons</h2><p class="muted" style="margin:0 0 14px">Tap a particle to learn what it does, when to use it, and the mistakes to avoid.</p>';
  var notes={Core:"they mark each word’s role",Focus:"emphasis & limits",Connecting:"join ideas",Ending:"tone & feeling"};
  ["Core","Focus","Connecting","Ending"].forEach(function(g){
    h+='<div class="phase-h"><b>'+g+'</b><span>'+notes[g]+'</span></div><div class="ugrid">';
    PLESSONS.filter(function(l){return l.g===g;}).forEach(function(l){
      h+='<div class="unit ready" onclick="openPLesson(\''+l.p+'\')"><div class="vk jp">'+l.p+'</div><div class="info"><b>'+l.name+'</b><div class="cando">'+l.when.split("。")[0].split(".")[0]+'.</div></div><div class="arr" style="color:var(--faint)">›</div></div>';
    });
    h+='</div>';
  });
  document.getElementById("v-practice").innerHTML=h;window.scrollTo(0,0);
}
function openPLesson(p){
  var l=findPLesson(p);if(!l)return;
  showOnly("v-practice");
  var h='<button class="back" onclick="renderParticleLessons()">‹ Particle lessons</button>';
  h+='<p class="eyebrow">Particle · '+l.g+'</p><h2 class="title"><span class="jp" style="font-size:26px;color:var(--rose-deep)">'+l.p+'</span> &nbsp;'+l.name+'</h2>';
  h+='<div class="sec"><div class="lab"><span class="d"></span>When &amp; why to use it</div><div class="when">'+l.when+'</div></div>';
  h+='<div class="sec"><div class="lab"><span class="d"></span>Patterns</div><div class="how jp">'+l.how.map(function(x){return jpf(x);}).join("<br>")+'</div></div>';
  h+='<div class="sec"><div class="lab"><span class="d"></span>In real sentences</div><p class="muted" style="margin:0 0 8px;font-size:11.5px">Tap any word for its reading &amp; meaning.</p>';
  l.ex.forEach(function(e){h+='<div class="ex"><div class="jl jp"><span>'+glossRender(e[0])+'</span>'+spkBtn(e[0])+'</div><div class="en">'+e[1]+'</div></div>';});
  h+='</div>';
  h+='<div class="sec"><div class="lab"><span class="d"></span>Watch out for</div>';
  l.watch.forEach(function(w){h+='<div class="warn"><span class="x">✕</span><span>'+jpf(w)+'</span></div>';});
  h+='</div>';
  h+='<button class="btn rose block" onclick="startParticles()" style="margin-bottom:10px">Practice the drills →</button>';
  document.getElementById("v-practice").innerHTML=h;window.scrollTo(0,0);
}

var chainStep=-1;
function dueTotal(){return dueCards().length+vDue().length+kDue().length;}
function startDailyReview(){chainStep=0;runChain();}
function runChain(){
  while(chainStep>=0&&chainStep<3){
    if(chainStep===0&&dueCards().length){startReview(false);showOnly("v-cards");return;}
    if(chainStep===1&&vDue().length){startVocabReview();showOnly("v-vocab");return;}
    if(chainStep===2&&kDue().length){startKanjiReview();showOnly("v-kanji");return;}
    chainStep++;
  }
  chainStep=-1;
  document.getElementById("v-cards").innerHTML='<div class="empty"><div class="em">'+svgIcon(IC.trophy,42)+'</div><p><b>Review done!</b><br>Everything due today is cleared \u2014<br>grammar, words and kanji.</p><button class="btn rose" onclick="go(\'home\')">Back to Today</button></div>';

var MAXINT=365, LEECH=6;
function fmtInt(d){if(d>=365)return Math.round(d/365)+"y";if(d>=30)return Math.round(d/30)+"mo";return d+"d";}
function previewInt(s,g){
  var v;
  if(g===1){v=(s.reps===0)?1:Math.max(1,Math.round(s.interval*1.2));}                       // Hard
  else if(g===2){v=(s.reps===0)?1:((s.reps===1)?6:Math.max(1,Math.round(s.interval*s.ease)));} // Good: 1 -> 6 -> xEase
  else{v=(s.reps===0)?4:((s.reps===1)?8:Math.max(2,Math.round(s.interval*s.ease*1.3)));}    // Easy
  return Math.min(v,MAXINT);
}
function sched(s,g){
  if(s.lapses===undefined)s.lapses=0;
  if(g===0){                                   // Again -> lapse, relearn from scratch, requeue now
    s.lapses++; s.ease=Math.max(1.3,s.ease-0.2);
    s.interval=0; s.reps=0; s.due=todayStr();
    if(s.lapses>=LEECH)s.leech=true;
    return true;
  }
  var iv=previewInt(s,g);                      // computed on current ease so it matches the button
  if(g===1)s.ease=Math.max(1.3,s.ease-0.15);
  if(g===3)s.ease=s.ease+0.15;
  s.interval=iv; s.due=addDays(s.interval); s.reps++;
  return false;
}
function gradesHTML(s,fn){
  return '<div class="grades">'+
    '<button class="grade g-again" onclick="'+fn+'(0)">Again<small>now</small></button>'+
    '<button class="grade g-hard" onclick="'+fn+'(1)">Hard<small>'+fmtInt(previewInt(s,1))+'</small></button>'+
    '<button class="grade g-good" onclick="'+fn+'(2)">Good<small>'+fmtInt(previewInt(s,2))+'</small></button>'+
    '<button class="grade g-easy" onclick="'+fn+'(3)">Easy<small>'+fmtInt(previewInt(s,3))+'</small></button>'+
    '</div>';
}
function leechBadge(s){return (s&&s.leech)?'<div class="leech">Tricky card — missed '+s.lapses+' times. Try a mnemonic, or rewrite how you remember it.</div>':'';}
function leechCount(){var n=0;function c(o){for(var k in o){if(o[k]&&o[k].leech)n++;}}c(state.cards);c(state.vocab);c(state.kanji);return n;}

function todayParticle(){
  var t=state.plessonToday||{date:null,p:null};
  if(t.date===todayStr()&&t.p)return t.p;
  var seen=state.plessonSeen||[];
  var un=PORDER.filter(function(p){return seen.indexOf(p)<0;});
  if(!un.length){seen=[];un=PORDER.slice();}
  var p=un[0];
  state.plessonSeen=seen.concat([p]);
  state.plessonToday={date:todayStr(),p:p};
  save();
  return p;
}


function renderLearnWashi(){
  var mains=OUTLINE.filter(function(o){return isMain(o.w);});
  var n=mains.length, cw=currentWeek().w, W=320, stepY=90, H=60+(n-1)*stepY+50;
  var pts=[];
  for(var i=0;i<n;i++){pts.push({x:(i%2===0)?58:W-58, y:H-45-i*stepY, o:mains[i]});}
  function curve(a,b){var my=(a.y+b.y)/2;return " C"+a.x+" "+my+", "+b.x+" "+my+", "+b.x+" "+b.y;}
  var full="M"+pts[0].x+" "+pts[0].y; for(var i=1;i<n;i++) full+=curve(pts[i-1],pts[i]);
  var ci=0; for(var i=0;i<n;i++){ if(mains[i].w===cw) ci=i; }
  var walked="M"+pts[0].x+" "+pts[0].y; for(var i=1;i<=ci;i++) walked+=curve(pts[i-1],pts[i]);
  var doneN=Object.keys(state.done).filter(function(x){return isMain(Number(x));}).length;
  var h='<p class="eyebrow">Curriculum</p><h2 class="title">The path</h2><p class="muted" style="margin:0 0 12px">'+doneN+' of '+n+' weeks walked. Tap a stop to open it.</p>';
  h+='<div class="card" style="padding:8px 4px"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">';
  h+='<path d="'+full+'" stroke="var(--line)" stroke-width="9" fill="none" stroke-linecap="round"/>';
  if(ci>0) h+='<path d="'+walked+'" stroke="var(--seal)" stroke-width="3.5" fill="none" stroke-linecap="round"/>';
  for(var i=0;i<n;i++){
    var p=pts[i], o=p.o, isDone=!!state.done[o.w], isCur=(o.w===cw), ready=!!CONTENT[o.w];
    var left=(p.x<W/2), lx=left?p.x+24:p.x-24, anch=left?"start":"end";
    var lab=o.t.length>15?o.t.slice(0,14)+"…":o.t;
    if(isDone){ h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="11" fill="var(--seal)"/><text x="'+p.x+'" y="'+(p.y+4)+'" font-size="10" fill="#fff" text-anchor="middle">済</text>'; }
    else if(isCur){ h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="13" fill="var(--seal)"/><circle cx="'+p.x+'" cy="'+p.y+'" r="19" fill="none" stroke="var(--seal)" stroke-width="1"/>'; }
    else { h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="9" fill="none" stroke="var(--faint)" stroke-width="2"/>'; }
    h+='<text x="'+lx+'" y="'+(isCur?p.y-3:p.y+4)+'" font-size="11" fill="'+(isCur?"var(--ink)":(isDone?"var(--muted)":"var(--faint)"))+'" text-anchor="'+anch+'">'+o.w+' · '+lab+'</text>';
    if(isCur) h+='<text x="'+lx+'" y="'+(p.y+11)+'" font-size="10" fill="var(--muted)" text-anchor="'+anch+'">you are here</text>';
    if(ready) h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="21" fill="transparent" style="cursor:pointer" onclick="openLesson('+o.w+')"/>';
  }
  h+='</svg></div>';
  h+='<div class="phase-h rev"><b>Foundations · review</b><span>anytime</span></div><div class="ugrid">';
  OUTLINE.filter(function(o){return !isMain(o.w)&&CONTENT[o.w];}).forEach(function(o){
    h+='<div class="unit ready" onclick="openLesson('+o.w+')"><div class="wknum">'+wkLabel(o.w)+'<small>REV</small></div><div class="info"><b>'+o.t+'</b><div class="cando">'+o.cando+'</div></div><div class="arr" style="color:var(--faint)">›</div></div>';
  });
  h+='</div>';
  document.getElementById("v-learn").innerHTML=h;
}


function exportProgress(){
  try{
    var data=localStorage.getItem("hanasu")||JSON.stringify(state);
    var blob=new Blob([data],{type:"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="tomo-backup-"+todayStr()+".json";
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},1500);
    toast("Backup saved");
  }catch(err){toast("Couldn't save the backup");}
}
function importProgress(){
  var inp=document.createElement("input");inp.type="file";inp.accept=".json,application/json";
  inp.onchange=function(){
    var f=inp.files&&inp.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var obj=JSON.parse(r.result);
        if(!obj||typeof obj!=="object"||Array.isArray(obj))throw new Error("bad");
        if(obj.done===undefined&&obj.cards===undefined)throw new Error("bad");
        localStorage.setItem("hanasu",JSON.stringify(obj));
        toast("Progress restored");
        setTimeout(function(){location.reload();},700);
      }catch(err){toast("That doesn't look like a Tomo backup");}
    };
    r.readAsText(f);
  };
  inp.click();
}
